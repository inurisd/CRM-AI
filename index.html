<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아이누리 CRM 워크스페이스 - 전문 관리자 모드</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* ── [1] 디자인 시스템 변수 정의 ── */
        :root {
            --ink: #1a1714;
            --ink-m: #6b6560;
            --ink-f: #c5bfb9;
            --paper: #faf8f5;
            --warm: #f2ede6;
            --card: #ffffff;
            --accent: #2d6a4f;
            --accent-l: #e8f4ee;
            --accent-m: #52b788;
            --warn: #c45c26;
            --warn-l: #fdf0e8;
            --info: #1e6091;
            --info-l: #e8f1f8;
            --purple: #6b3fa0;
            --purple-l: #f0eaf8;
            --gold: #b5831a;
            --gold-l: #fdf6e3;
            --bd: #e8e2da;
            --sh: 0 1px 3px rgba(26,23,20,.07), 0 4px 16px rgba(26,23,20,.04);
            --sh-lg: 0 8px 32px rgba(26,23,20,.13);
            --r: 12px;
            --rs: 8px;
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ── [2] 기본 스타일 초기화 ── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            background-color: var(--paper);
            color: var(--ink);
            line-height: 1.6;
            letter-spacing: -0.01em;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* ── [3] 로그인 인터페이스 ── */
        #login-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--paper);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        #login-screen.off {
            opacity: 0;
            pointer-events: none;
        }

        .login-box {
            background: var(--card);
            padding: 60px 50px;
            border-radius: 24px;
            box-shadow: var(--sh-lg);
            border: 1px solid var(--bd);
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        .login-logo {
            font-family: 'Nanum Myeongjo', serif;
            font-size: 32px;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 12px;
        }

        .login-desc {
            font-size: 14px;
            color: var(--ink-m);
            margin-bottom: 40px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .pw-field {
            width: 100%;
            padding: 15px;
            border: 1.5px solid var(--bd);
            border-radius: var(--rs);
            font-size: 16px;
            outline: none;
            transition: var(--transition);
            text-align: center;
        }

        .pw-field:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-l);
        }

        .login-submit {
            width: 100%;
            padding: 15px;
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: var(--rs);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .login-submit:hover {
            background-color: #1b4d36;
            transform: translateY(-1px);
        }

        /* ── [4] 레이아웃 및 헤더 ── */
        header {
            background-color: var(--card);
            height: 64px;
            border-bottom: 1px solid var(--bd);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-left { display: flex; align-items: center; gap: 15px; }
        .system-title {
            font-family: 'Nanum Myeongjo', serif;
            font-size: 18px;
            font-weight: 800;
            color: var(--accent);
        }

        .nav-actions { display: flex; gap: 10px; }
        .nav-btn {
            background: none; border: 1px solid var(--bd);
            padding: 6px 14px; border-radius: 6px; font-size: 12px;
            color: var(--ink-m); cursor: pointer; transition: var(--transition);
        }
        .nav-btn:hover { background: var(--warm); color: var(--ink); }

        /* ── [5] 필터 네비게이션 ── */
        .filter-nav {
            background: var(--card);
            border-bottom: 1px solid var(--bd);
            padding: 0 32px;
            display: flex;
            gap: 5px;
            overflow-x: auto;
            position: sticky;
            top: 64px;
            z-index: 999;
        }

        .filter-item {
            padding: 14px 18px;
            font-size: 13px;
            font-weight: 600;
            color: var(--ink-m);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: var(--transition);
            white-space: nowrap;
        }

        .filter-item:hover { color: var(--accent); }
        .filter-item.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
            background-color: var(--accent-l);
        }

        .filter-count {
            font-size: 10px;
            margin-left: 5px;
            opacity: 0.5;
        }

        /* ── [6] 메인 데이터 테이블 ── */
        main { padding: 30px 32px 120px; max-width: 1600px; margin: 0 auto; }

        .table-container {
            background: var(--card);
            border-radius: var(--r);
            border: 1px solid var(--bd);
            box-shadow: var(--sh);
            overflow: hidden;
        }

        .main-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .main-table th {
            background-color: var(--warm);
            padding: 14px;
            font-size: 11px;
            font-weight: 700;
            color: var(--ink-m);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--bd);
            text-align: left;
        }

        .main-table td {
            padding: 20px 14px;
            border-bottom: 1px solid var(--bd);
            vertical-align: top;
        }

        .main-table tr:hover { background-color: #fdfbf8; }

        /* ── [7] 메모 히스토리 및 펼치기 효과 ── */
        .memo-wrapper { position: relative; width: 100%; }
        .memo-scroll-area {
            position: relative;
            max-height: 5.4em; /* 약 3줄 */
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 13px;
        }
        .memo-scroll-area.expanded { max-height: 1500px; }

        /* 하단 그라데이션 */
        .memo-scroll-area:not(.expanded).has-history::after {
            content: "";
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 30px;
            background: linear-gradient(transparent, var(--card));
            pointer-events: none;
        }

        .memo-entry {
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px dashed var(--bd);
        }
        .memo-entry:last-child { border-bottom: none; }

        .memo-tag {
            font-size: 10px;
            font-weight: 700;
            color: var(--accent);
            background: var(--accent-l);
            padding: 2px 6px;
            border-radius: 4px;
            margin-right: 8px;
        }

        .expand-trigger {
            display: block;
            width: 100%;
            padding: 6px;
            margin-top: 8px;
            background: var(--warm);
            border: 1px solid var(--bd);
            border-radius: 6px;
            font-size: 11px;
            color: var(--ink-m);
            cursor: pointer;
            text-align: center;
        }

        /* ── [8] CRM 초안 에디터 ── */
        .draft-container { position: relative; }
        .draft-preview {
            background: var(--paper);
            border: 1px solid var(--bd);
            border-radius: var(--rs);
            padding: 12px;
            font-size: 13px;
            color: var(--ink);
            white-space: pre-wrap;
            min-height: 80px;
        }

        .edit-panel {
            display: none;
            margin-top: 12px;
            background: var(--warm);
            padding: 15px;
            border-radius: var(--rs);
            animation: slideDown 0.3s ease;
        }
        .edit-panel.active { display: block; }

        .draft-editor {
            width: 100%;
            height: 150px;
            padding: 12px;
            border: 1px solid var(--bd);
            border-radius: 6px;
            font-family: inherit;
            font-size: 13px;
            resize: vertical;
            outline: none;
        }

        .action-row {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 10px;
        }

        .btn-save { background: var(--accent); color: white; border: none; padding: 6px 15px; border-radius: 4px; cursor: pointer; font-weight: 600; }
        .btn-cancel { background: var(--ink-f); color: white; border: none; padding: 6px 15px; border-radius: 4px; cursor: pointer; }

        /* ── [9] 하단 관리 바 ── */
        .admin-dock {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            background: var(--card);
            border-top: 1px solid var(--bd);
            padding: 15px 32px;
            display: flex;
            align-items: center;
            gap: 20px;
            z-index: 1100;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.05);
        }

        .search-box {
            display: flex;
            align-items: center;
            background: var(--paper);
            border: 1.5px solid var(--bd);
            border-radius: var(--rs);
            padding: 2px 5px;
            width: 300px;
        }

        .search-input {
            border: none;
            background: none;
            padding: 10px;
            width: 100%;
            outline: none;
            font-size: 14px;
        }

        .add-patient-btn {
            margin-left: auto;
            background: var(--ink);
            color: white;
            padding: 10px 20px;
            border-radius: var(--rs);
            border: none;
            font-weight: 600;
            cursor: pointer;
        }

        /* ── [10] 모달 및 토스트 ── */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(26,23,20,0.7);
            backdrop-filter: blur(5px);
            display: flex; align-items: center; justify-content: center;
            z-index: 2000; opacity: 0; pointer-events: none; transition: 0.3s;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }

        .modal-content {
            background: white;
            width: 90%; max-width: 550px;
            border-radius: 20px;
            padding: 40px;
            box-shadow: var(--sh-lg);
        }

        #toast {
            position: fixed; bottom: 100px; right: 30px;
            padding: 15px 25px; border-radius: 10px;
            color: white; font-weight: 600; font-size: 14px;
            transform: translateY(100px); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 3000; box-shadow: var(--sh-lg);
        }
        #toast.visible { transform: translateY(0); }
        #toast.success { background: var(--accent); }
        #toast.error { background: var(--warn); }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 셀렉트 스타일 */
        .status-select {
            width: 100%;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid var(--bd);
            font-size: 12px;
            font-weight: 600;
            background-color: white;
            cursor: pointer;
        }

        .status-select.wait { color: var(--ink-m); }
        .status-select.done { color: var(--accent); border-color: var(--accent); background-color: var(--accent-l); }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <div class="login-logo">🌿 아이누리 CRM</div>
        <div class="login-desc">브랜드 네트워크 통합 관리 시스템</div>
        <div class="input-group">
            <input type="password" id="pw-input" class="pw-field" placeholder="액세스 비밀번호를 입력하세요" onkeydown="if(event.key==='Enter')attemptLogin()">
        </div>
        <button class="login-submit" onclick="attemptLogin()">시스템 접속</button>
        <div id="login-feedback" style="margin-top:15px; font-size:12px; color:var(--warn);"></div>
    </div>
</div>

<header>
    <div class="header-left">
        <div class="system-title">아이누리 CRM 관리센터</div>
        <span id="last-sync" style="font-size:11px; color:var(--ink-f);"></span>
    </div>
    <div class="nav-actions">
        <button class="nav-btn" onclick="fetchData()">전체 새로고침</button>
        <button class="nav-btn" onclick="processLogout()">로그아웃</button>
    </div>
</header>

<nav class="filter-nav" id="tab-nav">
    <div class="filter-item active" onclick="applyFilter('전체', this)">전체 <span class="filter-count" id="cnt-all">0</span></div>
    <div class="filter-item" onclick="applyFilter('복약안내', this)">💊 복약안내 <span class="filter-count" id="cnt-med">0</span></div>
    <div class="filter-item" onclick="applyFilter('중간점검', this)">🔍 중간점검 <span class="filter-count" id="cnt-mid">0</span></div>
    <div class="filter-item" onclick="applyFilter('종료전안내', this)">⏰ 종료전안내 <span class="filter-count" id="cnt-end">0</span></div>
    <div class="filter-item" onclick="applyFilter('마무리상담', this)">🎯 마무리상담 <span class="filter-count" id="cnt-fin">0</span></div>
</nav>

<main>
    <div id="loading-state" style="text-align:center; padding:100px 0;">
        <div style="font-size:30px; margin-bottom:15px;">⏳</div>
        <p style="color:var(--ink-m); font-weight:500;">노션 데이터베이스와 연결 중입니다...</p>
    </div>

    <div id="table-view" style="display:none;">
        <div class="table-container">
            <table class="main-table">
                <thead>
                    <tr>
                        <th style="width:60px;">번호</th>
                        <th style="width:130px;">환자 정보</th>
                        <th style="width:360px;">상담 및 진료 기록 히스토리</th>
                        <th>CRM 발송 초안</th>
                        <th style="width:140px;">진행 상태</th>
                    </tr>
                </thead>
                <tbody id="data-body"></tbody>
            </table>
        </div>
    </div>
</main>

<div class="admin-dock">
    <div style="font-size:13px; font-weight:700; color:var(--ink-m);">신규 조회/등록</div>
    <div class="search-box">
        <input type="text" id="chart-search-input" class="search-input" placeholder="차트번호 입력" onkeydown="if(event.key==='Enter')quickSearch()">
        <button onclick="quickSearch()" style="background:var(--accent); color:white; border:none; padding:8px 12px; border-radius:6px; cursor:pointer;">확인</button>
    </div>
    <button class="add-patient-btn" onclick="showModal('new-patient-modal')">+ 환자 직접 추가</button>
</div>

<div id="new-patient-modal" class="modal-overlay">
    <div class="modal-content">
        <h3 style="margin-bottom:20px; font-family:'Nanum Myeongjo'; color:var(--accent);">신규 내원 환자 등록</h3>
        <input type="text" id="new-name" class="pw-field" style="text-align:left; margin-bottom:15px;" placeholder="환자 성함 (필수)">
        <input type="text" id="new-chart" class="pw-field" style="text-align:left; margin-bottom:15px;" placeholder="차트번호">
        <textarea id="new-memo" class="draft-editor" style="height:120px; margin-bottom:20px;" placeholder="초기 상담 내용 또는 진료 메모를 입력하세요."></textarea>
        <div class="action-row">
            <button class="btn-save" onclick="createNewPatient()">데이터베이스 저장</button>
            <button class="btn-cancel" onclick="hideModal('new-patient-modal')">닫기</button>
        </div>
    </div>
</div>

<div id="toast"></div>

<script>
    const CONFIG = {
        dbId: '04f406a5be9b454b9dda793fac2d4fb4',
        pageSize: 100
    };

    let globalStore = [];
    let activeFilter = '전체';
    let authCredential = '';

    // [시스템 기동]
    window.addEventListener('DOMContentLoaded', () => {
        const cached = localStorage.getItem('inuri_crm_auth');
        if (cached) {
            authCredential = cached;
            document.getElementById('login-screen').classList.add('off');
            fetchData();
        }
    });

    // [로그인 로직]
    async function attemptLogin() {
        const pw = document.getElementById('pw-input').value;
        const feedback = document.getElementById('login-feedback');
        
        try {
            const res = await fetch('/api/notion?path=/users/me', { 
                headers: { 'x-crm-password': pw } 
            });
            
            if (res.ok) {
                authCredential = pw;
                localStorage.setItem('inuri_crm_auth', pw);
                document.getElementById('login-screen').classList.add('off');
                fetchData();
            } else {
                feedback.textContent = '비밀번호가 올바르지 않습니다. 다시 확인해주세요.';
            }
        } catch (err) {
            feedback.textContent = '네트워크 연결 상태를 확인해주세요.';
        }
    }

    function processLogout() {
        localStorage.removeItem('inuri_crm_auth');
        location.reload();
    }

    // [API 통신 엔진]
    async function requestNotion(path, method = 'GET', payload = null) {
        const options = {
            method,
            headers: {
                'Content-Type': 'application/json',
                'x-crm-password': authCredential
            }
        };
        if (payload) options.body = JSON.stringify(payload);

        const response = await fetch(`/api/notion?path=${encodeURIComponent(path)}`, options);
        if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
        return response.json();
    }

    // [데이터 동기화]
    async function fetchData() {
        toggleLoader(true);
        try {
            const raw = await requestNotion(`/databases/${CONFIG.dbId}/query`, 'POST', { 
                page_size: CONFIG.pageSize 
            });
            globalStore = raw.results.map(mapper);
            updateDashboard();
            document.getElementById('last-sync').textContent = `최근 동기화: ${new Date().toLocaleTimeString()}`;
        } catch (err) {
            triggerToast('데이터 동기화에 실패했습니다.', 'error');
        } finally {
            toggleLoader(false);
        }
    }

    function mapper(page) {
        const props = page.properties;
        const extract = (name, type) => {
            if (!props[name]) return '';
            if (type === 'title') return props[name].title?.[0]?.plain_text || '';
            if (type === 'text') return props[name].rich_text?.map(t => t.plain_text).join('') || '';
            if (type === 'select') return props[name].select?.name || '';
            return '';
        };

        return {
            uuid: page.id,
            name: extract('환자명', 'title'),
            chart: extract('차트번호', 'text'),
            memo: extract('진료메모요약', 'text'),
            draft: extract('CRM초안', 'text'),
            type: extract('CRM발송유형', 'select'),
            status: extract('발송상태', 'select')
        };
    }

    // [빠른 검색 및 전체 DB 조회]
    async function quickSearch() {
        const input = document.getElementById('chart-search-input');
        const query = input.value.trim();
        if (!query) return;

        // 1단계: 현재 로드된 목록에서 검색
        const localHit = globalStore.find(p => p.chart === query);
        if (localHit) {
            triggerToast(`${localHit.name}님은 이미 리스트에 존재합니다.`, 'success');
            focusOnRow(localHit.uuid);
            input.value = '';
            return;
        }

        // 2단계: 노션 전체 서버에서 검색
        triggerToast('노션 데이터베이스를 전체 검색 중입니다...', 'info');
        try {
            const result = await requestNotion(`/databases/${CONFIG.dbId}/query`, 'POST', {
                filter: { property: '차트번호', rich_text: { equals: query } }
            });

            if (result.results.length > 0) {
                const fetched = mapper(result.results[0]);
                globalStore.push(fetched); // 하단에 추가
                updateDashboard();
                focusOnRow(fetched.uuid);
                triggerToast('기존 환자 기록을 성공적으로 불러왔습니다.', 'success');
            } else {
                triggerToast('기존 기록이 없습니다. 신규 등록으로 이어집니다.', 'error');
                openQuickAdd(query);
            }
        } catch (e) {
            triggerToast('조회 중 통신 오류가 발생했습니다.', 'error');
        }
        input.value = '';
    }

    // [테이블 렌더링 로직]
    function updateDashboard() {
        const body = document.getElementById('data-body');
        const dataSet = activeFilter === '전체' ? globalStore : globalStore.filter(p => p.type === activeFilter);
        
        body.innerHTML = dataSet.map((p, i) => `
            <tr id="row-${p.uuid}">
                <td style="font-size:11px; color:var(--ink-f)">${i+1}</td>
                <td>
                    <div style="font-weight:700; color:var(--accent); font-size:15px;">${safe(p.name)}</div>
                    <div style="font-size:11px; color:var(--ink-m); margin-top:2px;">CHART. ${safe(p.chart)}</div>
                </td>
                <td>${buildMemoUI(p)}</td>
                <td>
                    <div class="draft-container">
                        <div class="draft-preview" id="preview-${p.uuid}">${safe(p.draft || '내용이 없습니다.')}</div>
                        <button class="expand-trigger" style="width:auto; padding:3px 10px; margin-top:8px;" onclick="toggleEditor('${p.uuid}')">✎ 기록 및 수정</button>
                        <div class="edit-panel" id="editor-panel-${p.uuid}">
                            <textarea id="textarea-${p.uuid}" class="draft-editor">${safe(p.draft)}</textarea>
                            <div class="action-row">
                                <button class="btn-save" onclick="saveDataUpdate('${p.uuid}')">노션에 기록 저장</button>
                                <button class="btn-cancel" onclick="toggleEditor('${p.uuid}')">취소</button>
                            </div>
                        </div>
                    </div>
                </td>
                <td>
                    <select class="status-select ${p.status === '발송완료' ? 'done' : 'wait'}" onchange="updatePageStatus('${p.uuid}', this.value)">
                        <option value="대기" ${p.status === '대기' ? 'selected' : ''}>⏳ 대기</option>
                        <option value="검토완료" ${p.status === '검토완료' ? 'selected' : ''}>✅ 검토완료</option>
                        <option value="발송완료" ${p.status === '발송완료' ? 'selected' : ''}>🚀 발송완료</option>
                        <option value="보류" ${p.status === '보류' ? 'selected' : ''}>✋ 보류</option>
                    </select>
                </td>
            </tr>
        `).join('');

        updateCounters();
    }

    function buildMemoUI(p) {
        if (!p.memo) return '<span style="color:var(--ink-f)">상담 기록 없음</span>';
        const lines = p.memo.split('\n').filter(l => l.trim() !== '');
        const hasHistory = lines.length > 3;

        return `
            <div class="memo-wrapper">
                <div id="memo-box-${p.uuid}" class="memo-scroll-area ${hasHistory ? 'has-history' : ''}">
                    ${lines.map(line => {
                        const dateTag = line.match(/^\[(.*?)\]/);
                        if (dateTag) {
                            return `<div class="memo-entry"><span class="memo-tag">${dateTag[0]}</span>${safe(line.replace(dateTag[0],''))}</div>`;
                        }
                        return `<div class="memo-entry">${safe(line)}</div>`;
                    }).join('')}
                </div>
                ${hasHistory ? `<button class="expand-trigger" id="ebtn-${p.uuid}" onclick="toggleMemoView('${p.uuid}')">▼ 과거 기록 펼치기</button>` : ''}
            </div>
        `;
    }

    // [데이터 저장 - 최신순 누적]
    async function saveDataUpdate(id) {
        const patient = globalStore.find(p => p.uuid === id);
        const newContent = document.getElementById(`textarea-${id}`).value.trim();
        const dateStr = new Date().toISOString().split('T')[0];
        
        // 핵심 로직: [날짜] 내용 + 기존 기록
        const entry = `[${dateStr}] ${newContent}`;
        const mergedMemo = patient.memo ? entry + '\n' + patient.memo : entry;

        try {
            await requestNotion(`/pages/${id}`, 'PATCH', {
                properties: {
                    'CRM초안': { rich_text: [{ text: { content: newContent } }] },
                    '진료메모요약': { rich_text: [{ text: { content: mergedMemo } }] }
                }
            });
            patient.draft = newContent;
            patient.memo = mergedMemo;
            triggerToast('노션에 성공적으로 기록되었습니다.', 'success');
            updateDashboard();
        } catch (e) {
            triggerToast('저장 중 오류가 발생했습니다.', 'error');
        }
    }

    // [기타 UI 함수]
    function toggleMemoView(id) {
        const box = document.getElementById(`memo-box-${id}`);
        const btn = document.getElementById(`ebtn-${id}`);
        const isExp = box.classList.toggle('expanded');
        btn.innerText = isExp ? '▲ 기록 접기' : '▼ 과거 기록 펼치기';
    }

    function toggleEditor(id) {
        document.getElementById(`editor-panel-${id}`).classList.toggle('active');
    }

    async function updatePageStatus(id, value) {
        try {
            await requestNotion(`/pages/${id}`, 'PATCH', {
                properties: { '발송상태': { select: { name: value } } }
            });
            const p = globalStore.find(x => x.uuid === id);
            if (p) p.status = value;
            triggerToast(`상태가 [${value}]로 변경되었습니다.`, 'success');
            updateDashboard();
        } catch (e) {
            triggerToast('상태 변경 실패', 'error');
        }
    }

    async function createNewPatient() {
        const name = document.getElementById('new-name').value.trim();
        const chart = document.getElementById('new-chart').value.trim();
        const memo = document.getElementById('new-memo').value.trim();

        if (!name) return triggerToast('환자 성함을 입력해주세요.', 'error');

        try {
            const res = await requestNotion('/pages', 'POST', {
                parent: { database_id: CONFIG.dbId },
                properties: {
                    '환자명': { title: [{ text: { content: name } }] },
                    '차트번호': { rich_text: [{ text: { content: chart } }] },
                    '진료메모요약': { rich_text: [{ text: { content: memo } }] },
                    '발송상태': { select: { name: '대기' } }
                }
            });
            globalStore.unshift(mapper(res));
            updateDashboard();
            hideModal('new-patient-modal');
            triggerToast('신규 환자가 등록되었습니다.', 'success');
        } catch (e) {
            triggerToast('등록 중 오류 발생', 'error');
        }
    }

    // [유틸리티]
    function updateCounters() {
        document.getElementById('cnt-all').textContent = globalStore.length;
        const map = { '복약안내': 'cnt-med', '중간점검': 'cnt-mid', '종료전안내': 'cnt-end', '마무리상담': 'cnt-fin' };
        Object.entries(map).forEach(([type, id]) => {
            document.getElementById(id).textContent = globalStore.filter(p => p.type === type).length;
        });
    }

    function applyFilter(f, el) {
        activeFilter = f;
        document.querySelectorAll('.filter-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        updateDashboard();
    }

    function focusOnRow(id) {
        setTimeout(() => {
            const el = document.getElementById(`row-${id}`);
            if (el) {
                el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                el.style.backgroundColor = 'var(--accent-l)';
                setTimeout(() => el.style.backgroundColor = '', 2000);
            }
        }, 300);
    }

    function showModal(id) { document.getElementById(id).classList.add('active'); }
    function hideModal(id) { document.getElementById(id).classList.remove('active'); }
    function openQuickAdd(c) { document.getElementById('new-chart').value = c; showModal('new-patient-modal'); }
    function toggleLoader(show) {
        document.getElementById('loading-state').style.display = show ? 'block' : 'none';
        document.getElementById('table-view').style.display = show ? 'none' : 'block';
    }

    function triggerToast(msg, type) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = `visible ${type === 'success' ? 'success' : 'error'}`;
        setTimeout(() => t.className = '', 3500);
    }

    function safe(s) {
        if (!s) return '';
        return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
</script>
</body>
</html>
