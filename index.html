<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아이누리 CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1714; --ink-m: #6b6560; --ink-f: #c5bfb9;
  --paper: #faf8f5; --warm: #f2ede6; --card: #ffffff;
  --accent: #2d6a4f; --accent-l: #e8f4ee; --accent-m: #52b788;
  --warn: #c45c26; --warn-l: #fdf0e8;
  --info: #1e6091; --info-l: #e8f1f8;
  --orange: #e07a2f; --orange-l: #fff4eb;
  --bd: #e8e2da;
  --sh: 0 1px 3px rgba(26,23,20,.07), 0 4px 16px rgba(26,23,20,.04);
  --sh-lg: 0 8px 32px rgba(26,23,20,.13);
  --r: 10px; --rs: 6px;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
body { font-family: 'Pretendard', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; font-size: 14px; line-height: 1.6; }

/* ── Login ── */
#login-screen { position: fixed; inset: 0; background: var(--paper); display: flex; align-items: center; justify-content: center; z-index: 1000; }
#login-screen.off { display: none; }
.login-box { background: var(--card); border-radius: 24px; padding: 56px 48px; max-width: 420px; width: 90%; box-shadow: var(--sh-lg); border: 1px solid var(--bd); text-align: center; }
.login-logo { font-family: 'Nanum Myeongjo', serif; font-size: 32px; font-weight: 800; color: var(--accent); margin-bottom: 8px; }
.login-sub { font-size: 14px; color: var(--ink-m); margin-bottom: 40px; line-height: 1.6; }
.pw-wrap { position: relative; margin-bottom: 16px; }
.pw-input { width: 100%; padding: 15px 16px; border: 2px solid var(--bd); border-radius: var(--rs); font-family: 'Pretendard', sans-serif; font-size: 16px; color: var(--ink); background: var(--paper); outline: none; transition: all .2s; text-align: center; letter-spacing: 0.1em; }
.pw-input:focus { border-color: var(--accent-m); background: #fff; }
.pw-toggle { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--ink-f); font-size: 18px; }
.login-btn { width: 100%; padding: 15px; background: var(--accent); color: #fff; border: none; border-radius: var(--rs); font-family: 'Pretendard', sans-serif; font-size: 16px; font-weight: 700; cursor: pointer; transition: background .2s; }
.login-btn:hover { background: #1e4a36; }
.login-error { font-size: 13px; color: var(--warn); margin-top: 12px; min-height: 20px; font-weight: 500; }
.login-remember { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 20px; cursor: pointer; }
.login-remember input { width: 16px; height: 16px; cursor: pointer; accent-color: var(--accent); }
.login-remember span { font-size: 13px; color: var(--ink-m); }

/* ── 1행: Header ── */
header { background: var(--card); border-bottom: 1px solid var(--bd); height: 46px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 500; padding: 0 2%; }
.brand { font-family: 'Nanum Myeongjo', serif; font-size: 16px; font-weight: 800; color: var(--accent); display: flex; align-items: center; gap: 8px; }
.bdot { width: 7px; height: 7px; background: var(--accent-m); border-radius: 50%; box-shadow: 0 0 6px var(--accent-m); }
.hright { display: flex; align-items: center; gap: 8px; }
.qbadge { background: var(--warn-l); color: var(--warn); font-size: 11px; font-weight: 800; padding: 3px 10px; border-radius: 20px; border: 1px solid rgba(196,92,38,0.2); }
.hsm { padding: 4px 10px; background: var(--warm); border: 1px solid var(--bd); border-radius: var(--rs); font-family: 'Pretendard', sans-serif; font-size: 12px; font-weight: 600; color: var(--ink-m); cursor: pointer; transition: all .2s; }
.hsm:hover { background: var(--accent-l); color: var(--accent); border-color: var(--accent-m); }
.hsm.ghost { background: transparent; border: none; }

/* ── 2행: Date Filter ── */
.date-bar { background: var(--card); border-bottom: 1px solid var(--bd); padding: 0 2%; display: flex; align-items: center; gap: 8px; height: 42px; }
.date-bar label { font-size: 11px; font-weight: 700; color: var(--ink-m); white-space: nowrap; }
.date-inp { padding: 4px 8px; border: 1.5px solid var(--bd); border-radius: var(--rs); font-family: 'Pretendard', sans-serif; font-size: 12px; color: var(--ink); background: var(--paper); outline: none; cursor: pointer; }
.date-inp:focus { border-color: var(--accent-m); }
.date-sep { color: var(--ink-f); font-size: 12px; }
.date-btn { padding: 4px 12px; background: var(--accent); color: #fff; border: none; border-radius: var(--rs); font-family: 'Pretendard', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap; }
.date-btn:hover { background: #1e4a36; }
.btn-all { padding: 4px 12px; background: var(--orange-l); border: 1.5px solid var(--orange); border-radius: var(--rs); font-family: 'Pretendard', sans-serif; font-size: 12px; font-weight: 700; color: var(--orange); cursor: pointer; transition: all .2s; white-space: nowrap; }
.btn-all:hover { background: var(--orange); color: #fff; }

/* ── 3행: Filter Tabs ── */
.fbar { background: var(--card); border-bottom: 1px solid var(--bd); display: flex; align-items: center; overflow-x: auto; padding: 0 2%; scrollbar-width: none; height: 38px; }
.fbar::-webkit-scrollbar { display: none; }
.ftab { padding: 0 14px; font-size: 12px; font-weight: 600; color: var(--ink-m); cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; background: none; border-left: none; border-right: none; border-top: none; font-family: 'Pretendard', sans-serif; transition: all .2s; height: 38px; display: flex; align-items: center; }
.ftab.on { color: var(--accent); border-bottom-color: var(--accent); }
.tcnt { display: inline-flex; align-items: center; justify-content: center; min-width: 16px; height: 16px; padding: 0 4px; background: var(--warm); border-radius: 8px; font-size: 10px; font-weight: 700; margin-left: 4px; color: var(--ink-m); }
.ftab.on .tcnt { background: var(--accent-l); color: var(--accent); }

/* ── 4행: Table ── */
main { padding: 12px 2% 0; }
.tbl-scroll-wrap { width: 100%; overflow-x: auto; }
.crm-tbl { min-width: 1100px; width: 100%; border-collapse: separate; border-spacing: 0; background: var(--card); border: 1px solid var(--bd); border-radius: var(--r); overflow: hidden; box-shadow: var(--sh); }
.crm-tbl thead tr { background: var(--warm); }
.crm-tbl th { padding: 9px 11px; font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-m); text-align: left; border-bottom: 1px solid var(--bd); white-space: nowrap; }
.crm-tbl tbody tr { transition: background .15s; }
.crm-tbl tbody tr:hover { background: #fdfcfa; }
.crm-tbl td { padding: 12px 11px; vertical-align: top; border-bottom: 1px dotted var(--bd); }
.crm-tbl tr:last-child td { border-bottom: none; }

/* ── Memo ── */
.memo-cell { width: 320px; }
.memo-wrap { position: relative; }
.memo-box { background: var(--warm); border-left: 3px solid var(--bd); border-radius: 0 var(--rs) var(--rs) 0; padding: 9px 28px 9px 10px; font-size: 12px; color: var(--ink-m); line-height: 1.6; white-space: pre-wrap; word-break: break-all; max-height: 4.8em; overflow: hidden; transition: max-height 0.4s; position: relative; }
.memo-box.open { max-height: 500px; background: #fff; border-color: var(--accent-m); overflow-y: auto; }
.memo-box:not(.open).has-more::after { content: ""; position: absolute; bottom: 0; left: 0; width: 100%; height: 20px; background: linear-gradient(transparent, var(--warm)); pointer-events: none; }
.memo-expand-btn { position: absolute; top: 6px; right: 4px; width: 20px; height: 20px; background: var(--bd); border: none; border-radius: 3px; color: var(--ink-m); font-size: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .2s; }
.memo-expand-btn:hover { background: var(--accent); color: #fff; }

/* ── Draft ── */
.draft-cell { width: 340px; }
.draft-wrap { position: relative; }
.draft-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; gap: 6px; }
.btn-gen { display: inline-flex; align-items: center; gap: 4px; padding: 4px 9px; background: var(--accent-l); color: var(--accent); border: 1px solid var(--accent-m); border-radius: var(--rs); font-family: 'Pretendard', sans-serif; font-size: 11px; font-weight: 700; cursor: pointer; transition: all .2s; white-space: nowrap; }
.btn-gen:hover { background: var(--accent); color: #fff; }
.btn-gen:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-pencil { width: 26px; height: 26px; border: 1px solid var(--bd); border-radius: var(--rs); background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: all .2s; flex-shrink: 0; }
.btn-pencil:hover, .btn-pencil.on { background: var(--accent-l); border-color: var(--accent-m); }
.draft-text { font-size: 12px; line-height: 1.7; color: var(--ink); background: var(--paper); border: 1.5px solid var(--bd); border-radius: var(--rs); padding: 10px; white-space: pre-wrap; word-break: break-all; min-height: 60px; }
.draft-empty { color: var(--ink-f); font-style: italic; font-size: 12px; }
.draft-divider { border: none; border-top: 2px dashed var(--accent-m); margin: 10px 0; }
.draft-edit-panel { display: none; }
.draft-edit-panel.on { display: block; }
.draft-edit-label { font-size: 10px; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase; color: var(--accent); margin-bottom: 5px; display: block; }
.draft-edit-txt { width: 100%; padding: 9px; background: #fff; border: 1.5px solid var(--accent-m); border-radius: var(--rs); font-family: 'Pretendard', sans-serif; font-size: 12px; color: var(--ink); resize: vertical; min-height: 90px; outline: none; line-height: 1.6; }
.draft-edit-txt:focus { border-color: var(--accent); }
.draft-save-btn { margin-top: 7px; padding: 5px 14px; background: var(--accent); color: #fff; border: none; border-radius: var(--rs); font-family: 'Pretendard', sans-serif; font-size: 11px; font-weight: 700; cursor: pointer; }
.draft-save-btn:hover { background: #1e4a36; }

/* ── Status ── */
.stat-cell { width: 85px; text-align: center; }
.stat-sel { width: 100%; padding: 5px 6px; border: 1.5px solid var(--bd); border-radius: var(--rs); font-family: 'Pretendard', sans-serif; font-size: 11px; font-weight: 600; color: var(--ink); background: var(--paper); outline: none; cursor: pointer; }

/* ── 6행: CRM 추가 입력 ── */
.crm-add-bar { background: var(--card); border-top: 2px solid var(--bd); padding: 10px 2%; display: flex; align-items: center; gap: 14px; }
.crm-add-label { font-size: 12px; font-weight: 800; color: var(--accent); white-space: nowrap; }
.crm-add-textarea { flex: 1; min-width: 0; padding: 9px 12px; border: 1.5px solid var(--bd); border-radius: var(--rs); font-family: 'Pretendard', sans-serif; font-size: 13px; color: var(--ink); background: var(--paper); outline: none; resize: none; line-height: 1.7; transition: border-color .2s; height: 66px; }
.crm-add-textarea:focus { border-color: var(--accent-m); background: #fff; }
.crm-add-right { display: flex; flex-direction: column; gap: 6px; min-width: 160px; }
.upload-zone-sm { border: 1.5px dashed var(--bd); border-radius: var(--rs); padding: 6px 10px; text-align: center; color: var(--ink-m); cursor: pointer; font-size: 11px; background: var(--paper); transition: all .2s; }
.upload-zone-sm:hover { border-color: var(--accent-m); background: var(--accent-l); color: var(--accent); }
.upload-zone-sm input[type=file] { display: none; }
.btn-ai-save { padding: 9px 14px; background: var(--accent); color: #fff; border: none; border-radius: var(--rs); font-family: 'Pretendard', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap; }
.btn-ai-save:hover { background: #1e4a36; }
.btn-ai-save:disabled { opacity: 0.6; cursor: not-allowed; }

/* ── 5행: Bottom Bar ── */
.add-bar { background: var(--card); border-top: 1px solid var(--bd); padding: 7px 2%; display: flex; align-items: center; gap: 10px; height: 48px; }
.chart-inp { padding: 7px 12px; border: 2px solid var(--bd); border-radius: var(--rs); font-family: 'Pretendard', sans-serif; font-size: 13px; font-weight: 500; width: 260px; outline: none; transition: border-color .2s; color: var(--ink-m); }
.chart-inp:focus { border-color: var(--accent); color: var(--ink); }
.btn-plus { width: 34px; height: 34px; background: var(--accent); color: #fff; border: none; border-radius: var(--rs); font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .2s; }
.btn-plus:hover { transform: translateY(-1px); box-shadow: 0 4px 10px rgba(45,106,79,0.3); }

/* ── 날짜 버튼 ── */
.btn-today { padding: 4px 12px; background: #e8f1f8; border: 1.5px solid #1e6091; border-radius: var(--rs); font-family: 'Pretendard', sans-serif; font-size: 12px; font-weight: 700; color: #1e6091; cursor: pointer; transition: all .2s; white-space: nowrap; }
.btn-today:hover { background: #1e6091; color: #fff; }
.btn-week { padding: 4px 12px; background: #e8f4ee; border: 1.5px solid #52b788; border-radius: var(--rs); font-family: 'Pretendard', sans-serif; font-size: 12px; font-weight: 700; color: #2d6a4f; cursor: pointer; transition: all .2s; white-space: nowrap; }
.btn-week:hover { background: #2d6a4f; color: #fff; }
.btn-nextweek { padding: 4px 12px; background: #f0eaf8; border: 1.5px solid #6b3fa0; border-radius: var(--rs); font-family: 'Pretendard', sans-serif; font-size: 12px; font-weight: 700; color: #6b3fa0; cursor: pointer; transition: all .2s; white-space: nowrap; }
.btn-nextweek:hover { background: #6b3fa0; color: #fff; }

/* ── 정렬 버튼 ── */
.sort-btn { padding: 3px 10px; background: var(--warm); border: 1px solid var(--bd); border-radius: var(--rs); font-family: 'Pretendard', sans-serif; font-size: 11px; font-weight: 600; color: var(--ink-m); cursor: pointer; transition: all .2s; white-space: nowrap; margin-left: 4px; }
.sort-btn.on { background: var(--accent-l); color: var(--accent); border-color: var(--accent-m); }

/* ── Toast ── */
#toast { position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%); padding: 9px 20px; border-radius: 40px; color: #fff; font-size: 13px; font-weight: 600; box-shadow: var(--sh-lg); z-index: 2000; opacity: 0; visibility: hidden; transition: all 0.3s; white-space: nowrap; }
#toast.on { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(-8px); }
#toast.ok { background: var(--accent); }
#toast.err { background: var(--warn); }
#toast.info { background: var(--info); }

/* ── Spinner ── */
#load-st { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 0; }
.spin { width: 32px; height: 32px; border: 3px solid var(--bd); border-top-color: var(--accent); border-radius: 50%; animation: rot 0.8s linear infinite; margin-bottom: 12px; }
@keyframes rot { to { transform: rotate(360deg); } }
.tmeta { font-size: 11px; color: var(--ink-m); margin-bottom: 10px; }
</style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">🌿 아이누리</div>
    <p class="login-sub">아이누리 CRM 워크스페이스<br>비밀번호를 입력해 주세요.</p>
    <div class="pw-wrap">
      <input type="password" id="pw-input" class="pw-input" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')doLogin()">
      <button class="pw-toggle" onclick="togglePw()" id="pw-eye">👁</button>
    </div>
    <button class="login-btn" onclick="doLogin()">입장</button>
    <p class="login-error" id="login-err"></p>
    <label class="login-remember"><input type="checkbox" id="remember-chk" checked><span>로그인 상태 유지</span></label>
  </div>
</div>

<!-- ── 1행: HEADER ── -->
<header>
  <div class="brand"><div class="bdot"></div>아이누리 CRM <span style="font-weight:400;font-size:11px;margin-left:6px;color:var(--ink-f)">v1.0</span></div>
  <div class="hright">
    <span class="qbadge" id="qcnt">확인 중...</span>
    <button class="hsm" onclick="load()">↺ 새로고침</button>
    <button class="hsm ghost" onclick="logout()">로그아웃</button>
  </div>
</header>

<!-- ── 2행: DATE FILTER ── -->
<div class="date-bar">
  <label>CRM 예정일</label>
  <input type="date" id="date-from" class="date-inp">
  <span class="date-sep">~</span>
  <input type="date" id="date-to" class="date-inp">
  <button class="date-btn" onclick="load()">🔍 조회</button>
  <button class="btn-today" onclick="setToday(true)">오늘</button>
  <button class="btn-week" onclick="setThisWeek(true)">이번 주</button>
  <button class="btn-nextweek" onclick="setNextWeek()">다음 주</button>
  <button class="btn-all" onclick="clearDateFilter()">전체 보기</button>
</div>

<!-- ── 3행: FILTER TABS ── -->
<div class="fbar">
  <button class="ftab on" onclick="setF('전체',this)">전체 <span class="tcnt" id="c-전체">0</span></button>
  <button class="ftab" onclick="setF('대기',this)">⏳ 대기 <span class="tcnt" id="c-대기">0</span></button>
  <button class="ftab" onclick="setF('검토완료',this)">✅ 검토완료 <span class="tcnt" id="c-검토완료">0</span></button>
  <button class="ftab" onclick="setF('보류',this)">🔸 보류 <span class="tcnt" id="c-보류">0</span></button>
  <button class="ftab" onclick="setF('발송완료',this)">📨 발송완료 <span class="tcnt" id="c-발송완료">0</span></button>
  <div style="margin-left:auto;display:flex;align-items:center;padding-right:4px">
    <button class="sort-btn on" id="sort-date-btn" onclick="setSort('CRM예정일')">📅 CRM일정 <span id="sort-date-arrow">↑</span></button>
    <button class="sort-btn" id="sort-chart-btn" onclick="setSort('차트번호')">🔢 차트번호 <span id="sort-chart-arrow">↑</span></button>
  </div>
</div>

<!-- ── 4행: TABLE ── -->
<main>
  <div id="load-st">
    <div class="spin"></div>
    <p style="color:var(--ink-m);font-weight:600;font-size:12px;">노션 연결 중...</p>
  </div>
  <div id="tbl-wrap" style="display:none">
    <div class="tmeta" id="tmeta"></div>
    <div class="tbl-scroll-wrap">
      <table class="crm-tbl">
        <thead>
          <tr>
            <th style="width:36px;text-align:center">No.</th>
            <th style="width:60px">환자 정보</th>
            <th style="width:80px">CRM 일정</th>
            <th class="memo-cell">메모</th>
            <th class="draft-cell">CRM 초안</th>
            <th class="stat-cell">상태</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</main>

<!-- ── 6행: CRM 추가 입력 ── -->
<div class="crm-add-bar">
  <span class="crm-add-label">CRM 추가 내용</span>
  <textarea id="crm-add-text" class="crm-add-textarea" placeholder="예) 3번 A환자는 4월 11일 CRM 예정, 65번 B환자는 약 다 먹었는지 확인을 5월 2일 예정..."></textarea>
  <div class="crm-add-right">
    <div class="upload-zone-sm" onclick="document.getElementById('crm-add-file').click()" id="crm-upload-label">
      <input type="file" id="crm-add-file" accept=".txt" onchange="onCrmFileSelect(this)">
      📄 파일 첨부 (.txt)
    </div>
    <button class="btn-ai-save" id="crm-add-btn" onclick="sendAI()">✨ AI 분석 후 Notion 저장</button>
  </div>
</div>

<!-- ── 5행: BOTTOM BAR (주석 처리 - 필요시 활성화) ──
<div class="add-bar">
  <span style="font-size:12px;font-weight:800;color:var(--accent)">직접 등록</span>
  <input type="text" id="chart-q" class="chart-inp" placeholder="추가할 차트번호 입력 후 Enter" onkeydown="if(event.key==='Enter')addFromChart()">
  <button class="btn-plus" onclick="addFromChart()">+</button>
  <div style="margin-left:auto;color:var(--ink-f);font-size:11px">© 아이누리한의원 CRM v1.0</div>
</div>
──>
<div style="text-align:right;padding:4px 2%;font-size:11px;color:var(--ink-f)">© 아이누리한의원 CRM v1.0</div>

<div id="toast"></div>

<script>
const DB_ID      = '04f406a5-be9b-454b-9dda-793fac2d4fb4';
const N8N_URL    = 'https://1jump2sky.duckdns.org/webhook/ai-crm-update';
const N8N_AI_URL = 'https://1jump2sky.duckdns.org/webhook/ai-crm-ai';

let patients = [], curFilter = '전체', sessionPw = '', expandedMemoId = null;
let sortField = 'CRM예정일', sortAsc = true;

window.onload = () => {
  const saved = localStorage.getItem('crm_pw');
  if (saved) { sessionPw = saved; document.getElementById('login-screen').classList.add('off'); load(); }
  setToday();
};

async function notion(path, method, body) {
  const res = await fetch('/api/notion?path=' + encodeURIComponent(path), {
    method: method || 'GET',
    headers: { 'Content-Type': 'application/json', 'x-crm-password': sessionPw },
    body: ['GET','HEAD'].includes(method) ? undefined : JSON.stringify(body)
  });
  if (res.status === 401) { logout(); throw new Error('인증 실패'); }
  if (!res.ok) throw new Error('API 오류');
  return res.json();
}

async function callGroq(prompt) {
  const res = await fetch('/api/notion?path=/groq', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-crm-password': sessionPw },
    body: JSON.stringify({
      model: 'llama-3.3-70b-versatile',
      messages: [{ role: 'user', content: prompt }],
      temperature: 0.7
    })
  });
  if (!res.ok) throw new Error('Groq 오류');
  const data = await res.json();
  return data?.choices?.[0]?.message?.content || '';
}

async function callN8N(url, payload) {
  const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
  if (!res.ok) throw new Error('n8n 오류');
  return res.json().catch(() => ({}));
}

function setToday(autoLoad) {
  const t = new Date().toISOString().split('T')[0];
  document.getElementById('date-from').value = t;
  document.getElementById('date-to').value   = t;
  if (autoLoad) load();
}
function setThisWeek(autoLoad) {
  const now = new Date();
  const sun = new Date(now); sun.setDate(now.getDate() - now.getDay());
  const sat = new Date(sun); sat.setDate(sun.getDate() + 6);
  document.getElementById('date-from').value = sun.toISOString().split('T')[0];
  document.getElementById('date-to').value   = sat.toISOString().split('T')[0];
  if (autoLoad) load();
}
function setNextWeek() {
  const now = new Date();
  const sun = new Date(now); sun.setDate(now.getDate() - now.getDay() + 7);
  const sat = new Date(sun); sat.setDate(sun.getDate() + 6);
  document.getElementById('date-from').value = sun.toISOString().split('T')[0];
  document.getElementById('date-to').value   = sat.toISOString().split('T')[0];
  load();
}
function setSort(field) {
  if (sortField === field) {
    sortAsc = !sortAsc;
  } else {
    sortField = field;
    sortAsc = true;
    document.getElementById('sort-date-btn').classList.remove('on');
    document.getElementById('sort-chart-btn').classList.remove('on');
  }
  document.getElementById('sort-date-btn').classList.toggle('on', sortField === 'CRM예정일');
  document.getElementById('sort-chart-btn').classList.toggle('on', sortField === '차트번호');
  document.getElementById('sort-date-arrow').textContent = sortField === 'CRM예정일' ? (sortAsc ? '↑' : '↓') : '↑';
  document.getElementById('sort-chart-arrow').textContent = sortField === '차트번호' ? (sortAsc ? '↑' : '↓') : '↑';
  renderTable();
}
function clearDateFilter() {
  document.getElementById('date-from').value = '';
  document.getElementById('date-to').value   = '';
  load();
}

async function load() {
  document.getElementById('load-st').style.display = 'flex';
  document.getElementById('tbl-wrap').style.display = 'none';
  const from = document.getElementById('date-from').value;
  const to   = document.getElementById('date-to').value;
  try {
    const qb = { sorts: [{ property: 'CRM예정일', direction: 'ascending' }] };
    if (from || to) {
      const f = [];
      if (from) f.push({ property: 'CRM예정일', date: { on_or_after: from } });
      if (to)   f.push({ property: 'CRM예정일', date: { on_or_before: to } });
      qb.filter = f.length === 1 ? f[0] : { and: f };
    }
    const res = await notion(`/databases/${DB_ID}/query`, 'POST', qb);
    patients = res.results.map(parse);
    renderTable(); updateCounts();
  } catch(e) {
    document.getElementById('load-st').style.display = 'none';
    toast('데이터를 불러오지 못했습니다.', 'err');
  }
}

function parse(page) {
  const p = page.properties;
  const g = (k, t) => {
    if (!p[k]) return '';
    if (t === 'title') return p[k].title?.[0]?.plain_text || '';
    if (t === 'rt')    return p[k].rich_text?.map(x => x.plain_text).join('') || '';
    if (t === 'sel')   return p[k].select?.name || '';
    if (t === 'date')  return p[k].date?.start || '';
    return '';
  };
  return { id: page.id, 관리번호: g('관리번호','title'), 차트번호: g('차트번호','rt'), 환자명: g('환자명','rt'), 등록일: g('등록일','date'), CRM예정일: g('CRM예정일','date'), 메모: g('메모','rt'), CRM초안: g('CRM초안','rt'), 발송상태: g('발송상태','sel') };
}

  document.getElementById('tbl-wrap').style.display = 'block';

  list.sort((a, b) => {
    const av = a[sortField] || '';
    const bv = b[sortField] || '';
    return sortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
  });
  document.getElementById('tmeta').innerText = `총 ${list.length}건`;
  document.getElementById('tbody').innerHTML = list.map((p, i) => {
    const hasMore  = (p.메모||'').length > 80 || (p.메모||'').split('\n').length > 3;
    const hasDraft = p.CRM초안 && p.CRM초안.trim();
    return `
    <tr id="row-${p.id}">

      <td>
        <div style="font-weight:800;font-size:13px;margin-bottom:2px">${esc(p.환자명||'(이름없음)')}</div>

      </td>
      <td>
        <div style="font-size:10px;color:var(--ink-m)">CRM 예정</div>
        <div id="crm-date-view-${p.id}" style="font-size:13px;font-weight:700;color:${p.CRM예정일?'var(--accent)':'var(--ink-f)'};cursor:pointer" onclick="startDateEdit('${p.id}','${p.CRM예정일||''}')" title="클릭하여 변경">${p.CRM예정일||'미정'}</div>
        <div id="crm-date-edit-${p.id}" style="display:none;margin-top:4px">
          <input type="date" id="crm-date-inp-${p.id}" value="${p.CRM예정일||''}" style="width:100%;padding:4px;border:1.5px solid var(--accent-m);border-radius:var(--rs);font-size:11px;outline:none;">
          <div style="display:flex;gap:4px;margin-top:4px">
            <button onclick="saveCrmDate('${p.id}')" style="padding:3px 8px;background:var(--accent);color:#fff;border:none;border-radius:var(--rs);font-size:10px;font-weight:700;cursor:pointer">저장</button>
            <button onclick="cancelDateEdit('${p.id}')" style="padding:3px 6px;background:var(--warm);border:1px solid var(--bd);border-radius:var(--rs);font-size:10px;cursor:pointer">취소</button>
          </div>
        </div>
        <div style="font-size:10px;color:var(--ink-f)">등록 ${esc(p.등록일)}</div>
      </td>
      <td class="memo-cell">
        <div class="memo-wrap">
          <div id="m-box-${p.id}" class="memo-box ${hasMore?'has-more':''}" onclick="startMemoEdit('${p.id}')" title="클릭하여 편집" style="cursor:pointer">${esc(p.메모||'메모 없음')}</div>
          ${hasMore?`<button class="memo-expand-btn" id="m-btn-${p.id}" onclick="event.stopPropagation();toggleMemo('${p.id}')">▼</button>`:''}
          <div id="m-edit-${p.id}" style="display:none;margin-top:6px">
            <textarea id="m-txt-${p.id}" style="width:100%;padding:8px;border:1.5px solid var(--accent-m);border-radius:var(--rs);font-family:'Pretendard',sans-serif;font-size:12px;line-height:1.6;resize:vertical;min-height:100px;outline:none;" onclick="event.stopPropagation()">${esc(p.메모||'')}</textarea>
            <div style="display:flex;gap:6px;margin-top:4px">
              <button onclick="saveMemo('${p.id}')" style="padding:4px 12px;background:var(--accent);color:#fff;border:none;border-radius:var(--rs);font-size:11px;font-weight:700;cursor:pointer">💾 저장</button>
              <button onclick="cancelMemoEdit('${p.id}')" style="padding:4px 10px;background:var(--warm);border:1px solid var(--bd);border-radius:var(--rs);font-size:11px;cursor:pointer">취소</button>

        </div>
      </td>
      <td class="draft-cell">

            <input type="text" id="gen-hint-${p.id}" placeholder="추가 지시사항 (예: 내원 유도, 복약 확인, 다음 처방...)" style="flex:1;padding:4px 8px;border:1px solid var(--bd);border-radius:var(--rs);font-family:'Pretendard',sans-serif;font-size:11px;color:var(--ink-m);background:var(--paper);outline:none;">

          <option ${p.발송상태==='보류'?'selected':''}>보류</option>

  }).join('') || `<tr><td colspan="6" style="text-align:center;padding:50px;color:var(--ink-f);font-size:13px">해당 기간에 CRM 예정 환자가 없습니다.</td></tr>`;

function startDateEdit(id, currentDate) {
  document.getElementById('crm-date-view-'+id).style.display = 'none';
  document.getElementById('crm-date-edit-'+id).style.display = 'block';
  document.getElementById('crm-date-inp-'+id).value = currentDate;
}

function cancelDateEdit(id) {
  document.getElementById('crm-date-view-'+id).style.display = '';
  document.getElementById('crm-date-edit-'+id).style.display = 'none';
}

async function saveCrmDate(id) {
  const newDate = document.getElementById('crm-date-inp-'+id).value;
  if (!newDate) { toast('날짜를 선택해주세요.', 'err'); return; }
  const p = patients.find(x => x.id === id);
  try {
    await notion(`/pages/${id}`, 'PATCH', {
      properties: { 'CRM예정일': { date: { start: newDate } } }
    });
    p.CRM예정일 = newDate;
    toast('CRM 예정일이 변경되었습니다.', 'ok');
    renderTable();
  } catch(e) { toast('저장 실패', 'err'); }
}

function startMemoEdit(id) {
  document.getElementById('m-box-'+id).style.display = 'none';
  const editDiv = document.getElementById('m-edit-'+id);
  editDiv.style.display = 'block';
  const btn = document.getElementById('m-btn-'+id);
  if (btn) btn.style.display = 'none';
  document.getElementById('m-txt-'+id).focus();
}

function cancelMemoEdit(id) {
  document.getElementById('m-box-'+id).style.display = '';
  document.getElementById('m-edit-'+id).style.display = 'none';
  const btn = document.getElementById('m-btn-'+id);
  if (btn) btn.style.display = '';
}

async function saveMemo(id) {
  const newMemo = document.getElementById('m-txt-'+id).value.trim();
  const p = patients.find(x => x.id === id);
  try {
    await notion(`/pages/${id}`, 'PATCH', {
      properties: { '메모': { rich_text: [{ text: { content: newMemo } }] } }
    });
    p.메모 = newMemo;
    toast('메모가 저장되었습니다.', 'ok');
    renderTable();
  } catch(e) { toast('저장 실패', 'err'); }
}

function toggleMemo(id) {
  if (expandedMemoId && expandedMemoId !== id) {
    const pb = document.getElementById('m-box-'+expandedMemoId);
    const pb2 = document.getElementById('m-btn-'+expandedMemoId);
    if (pb) pb.classList.remove('open');
    if (pb2) { pb2.textContent = '▼'; }
  }
  const box = document.getElementById('m-box-'+id);
  const btn = document.getElementById('m-btn-'+id);
  const isOpen = box.classList.toggle('open');
  if (btn) btn.textContent = isOpen ? '▲' : '▼';
  expandedMemoId = isOpen ? id : null;
}

function toggleDraftEdit(id) {
  const ep  = document.getElementById('ep-'+id);
  const btn = document.getElementById('pencil-'+id);
  const isOn = ep.classList.toggle('on');
  btn.classList.toggle('on', isOn);
  if (isOn) {
    const p = patients.find(x => x.id === id);
    document.getElementById('dt-'+id).value = p.CRM초안 || '';
  }
}

async function saveDraft(id) {
  const newDraft = document.getElementById('dt-'+id).value.trim();
  if (!newDraft) { toast('수정안을 입력하세요.', 'err'); return; }
  const p = patients.find(x => x.id === id);
  const now = new Date().toLocaleDateString('ko-KR');
  const newMemo = (p.메모 ? p.메모 + '\n' : '') + `[${now} 수정안 저장]`;
  try {
    await notion(`/pages/${id}`, 'PATCH', { properties: { 'CRM초안': { rich_text: [{ text: { content: newDraft } }] }, '메모': { rich_text: [{ text: { content: newMemo } }] } } });
    p.CRM초안 = newDraft; p.메모 = newMemo;
    toast('수정안이 저장되었습니다.', 'ok');
    renderTable();
  } catch(e) { toast('저장 실패', 'err'); }
}

async function generateDraft(id) {
  const p    = patients.find(x => x.id === id);
  const btn  = document.getElementById('gen-btn-'+id);
  const hint = document.getElementById('gen-hint-'+id)?.value?.trim() || '';
  btn.disabled = true; btn.textContent = '⏳ 생성 중...';
  toast(`${p.환자명||'환자'}님 초안 생성 중...`, 'info');
  try {
    const prompt = `당신은 한의원 CRM 문자 작성 전문가입니다.

아래 환자 정보와 메모를 바탕으로 CRM 문자 초안을 작성해주세요.

작성 기준:
1. 전체 메모를 읽고 환자의 전반적인 상태와 치료 경과를 파악하세요.
2. 최근 2-3개월 내용을 중심으로 현재 상황에 맞는 문자를 작성하세요.
3. 따뜻하고 친근한 톤으로, 환자가 부담없이 읽을 수 있도록 작성하세요.
4. 200자 이내로 간결하게 작성하세요.
5. 문자 내용만 출력하세요. 설명이나 부가 내용 없이.${hint ? '\n6. 추가 지시사항: ' + hint : ''}

환자 정보:
- 환자명: ${p.환자명}
- 차트번호: ${p.차트번호}
- CRM 예정일: ${p.CRM예정일}

메모 전체 내용:
${p.메모}`;

    const draft = await callGroq(prompt);
    if (!draft) throw new Error('초안 생성 실패');
    const now = new Date().toLocaleDateString('ko-KR');
    const newMemo = (p.메모 ? p.메모 + '\n' : '') + `[${now} AI 초안 생성]`;
    await notion(`/pages/${id}`, 'PATCH', { properties: { 'CRM초안': { rich_text: [{ text: { content: draft } }] }, '메모': { rich_text: [{ text: { content: newMemo } }] } } });
    p.CRM초안 = draft; p.메모 = newMemo;
    toast('초안이 생성되었습니다!', 'ok');
    renderTable();
  } catch(e) {
    toast('초안 생성 실패: ' + e.message, 'err');
    btn.disabled = false; btn.textContent = '✨ 초안 생성';
  }
}

async function sendAI() {
  const text = document.getElementById('crm-add-text').value.trim();
  const file  = document.getElementById('crm-add-file').files[0];
  let content = text;
  if (!content && file) content = await file.text();
  if (!content) { toast('내용을 입력하거나 파일을 첨부하세요.', 'err'); return; }
  const btn = document.getElementById('crm-add-btn');
  btn.disabled = true; btn.textContent = '⏳ AI 분석 중...';
  try {
    await callN8N(N8N_AI_URL, { text: content });
    toast('AI가 분석하여 Notion에 저장했습니다!', 'ok');
    document.getElementById('crm-add-text').value = '';
    document.getElementById('crm-add-file').value = '';
    setTimeout(() => load(), 2000);
  } catch(e) { toast('전송 실패: ' + e.message, 'err'); }
  finally { btn.disabled = false; btn.textContent = '✨ AI 분석 후 Notion 저장'; }
}

async function addFromChart() {
  const chart = document.getElementById('chart-q').value.trim();
  if (!chart) return;
  toast(`차트번호 ${chart} 조회 중...`, 'info');
  try {
    const res = await callN8N(N8N_URL, { action: 'READ', 차트번호: chart });
    if (res.rows && res.rows.length > 0) { toast(`${res.rows.length}건 조회되었습니다.`, 'ok'); load(); }
    else toast('해당 차트번호가 없습니다. 아래 CRM 추가 입력창을 이용해주세요.', 'info');
  } catch(e) { toast('조회 실패', 'err'); }
  document.getElementById('chart-q').value = '';
}

async function updateStat(id, val) {
  try {
    const p = patients.find(x => x.id === id);
    const now = new Date().toLocaleDateString('ko-KR');
    const props = { '발송상태': { select: { name: val } } };
    if (val === '발송완료') {
      const sentContent = p.CRM초안 ? `\n발송내용: ${p.CRM초안}` : '';
      const newMemo = (p.메모 ? p.메모 + '\n' : '') + `[${now} 발송완료]${sentContent}`;
      props['메모'] = { rich_text: [{ text: { content: newMemo } }] };
      p.메모 = newMemo;
    }
    await notion(`/pages/${id}`, 'PATCH', { properties: props });
    if (p) p.발송상태 = val;
    updateCounts();
    toast(`상태 변경: ${val}`, 'ok');
  } catch(e) { toast('상태 변경 실패', 'err'); }
}

function updateCounts() {
  const counts = { '전체': patients.length, '대기': 0, '검토완료': 0, '보류': 0, '발송완료': 0 };
  patients.forEach(p => { if (counts[p.발송상태] !== undefined) counts[p.발송상태]++; });
  Object.keys(counts).forEach(k => { const el = document.getElementById('c-'+k); if(el) el.innerText = counts[k]; });
  document.getElementById('qcnt').innerText = `미발송: ${patients.filter(x=>x.발송상태!=='발송완료').length}건`;
}

async function doLogin() {
  const pw = document.getElementById('pw-input').value;
  if (!pw) return;
  try {
    const res = await fetch('/api/notion?path=/users/me', { method: 'GET', headers: { 'x-crm-password': pw } });
    if (res.status === 401) { document.getElementById('login-err').innerText = '비밀번호가 올바르지 않습니다.'; return; }
    sessionPw = pw;
    if (document.getElementById('remember-chk').checked) localStorage.setItem('crm_pw', pw);
    document.getElementById('login-screen').classList.add('off');
    load();
  } catch(e) { document.getElementById('login-err').innerText = '서버 연결 실패'; }
}

function logout() { localStorage.removeItem('crm_pw'); location.reload(); }
function togglePw() {
  const input = document.getElementById('pw-input');
  input.type = input.type === 'password' ? 'text' : 'password';
  document.getElementById('pw-eye').innerText = input.type === 'password' ? '👁' : '🔒';
}
function onCrmFileSelect(input) {
  document.getElementById('crm-upload-label').childNodes[1].textContent = input.files[0] ? `📎 ${input.files[0].name}` : '📄 파일 첨부 (.txt)';
}
function setF(f, el) {
  curFilter = f;
  document.querySelectorAll('.ftab').forEach(t => t.classList.remove('on'));
  el.classList.add('on');
  renderTable();
}
function toast(msg, type) {
  const t = document.getElementById('toast');
  t.innerText = msg; t.className = 'on ' + type;
  clearTimeout(t._t); t._t = setTimeout(() => t.className = '', 3500);
}
function esc(str) {
  return !str ? '' : String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[m]));
}
</script>
