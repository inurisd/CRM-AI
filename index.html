<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아이누리 CRM 워크스페이스</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── [SECTION 1] CSS Variables & Base Styles (원본 복원) ── */
:root {
  --ink: #1a1714; --ink-m: #6b6560; --ink-f: #c5bfb9;
  --paper: #faf8f5; --warm: #f2ede6; --card: #ffffff;
  --accent: #2d6a4f; --accent-l: #e8f4ee; --accent-m: #52b788;
  --warn: #c45c26; --warn-l: #fdf0e8;
  --info: #1e6091; --info-l: #e8f1f8;
  --purple: #6b3fa0; --purple-l: #f0eaf8;
  --gold: #b5831a; --gold-l: #fdf6e3;
  --bd: #e8e2da;
  --sh: 0 1px 3px rgba(26,23,20,.07), 0 4px 16px rgba(26,23,20,.04);
  --sh-lg: 0 8px 32px rgba(26,23,20,.13);
  --r: 10px; --rs: 6px;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
body { font-family: 'Pretendard', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; font-size: 14px; line-height: 1.6; }
main { padding: 20px 2.5% 100px; width: 95%; max-width: 1800px; margin: 0 auto; }

/* ── [SECTION 2] Login Screen (상세 스타일 복원) ── */
#login-screen { position: fixed; inset: 0; background: var(--paper); display: flex; align-items: center; justify-content: center; z-index: 1000; }
#login-screen.off { display: none; }
.login-box { background: var(--card); border-radius: 24px; padding: 56px 48px; max-width: 420px; width: 90%; box-shadow: var(--sh-lg); border: 1px solid var(--bd); text-align: center; }
.login-logo { font-family: 'Nanum Myeongjo', serif; font-size: 32px; font-weight: 800; color: var(--accent); margin-bottom: 8px; letter-spacing: -0.02em; }
.login-sub { font-size: 14px; color: var(--ink-m); margin-bottom: 40px; line-height: 1.6; font-weight: 400; }
.pw-wrap { position: relative; margin-bottom: 16px; }
.pw-input { width: 100%; padding: 15px 16px; border: 2px solid var(--bd); border-radius: var(--rs); font-family: 'Pretendard', sans-serif; font-size: 16px; color: var(--ink); background: var(--paper); outline: none; transition: all .2s; text-align: center; letter-spacing: 0.1em; }
.pw-input:focus { border-color: var(--accent-m); background: #fff; }
.pw-toggle { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--ink-f); font-size: 18px; padding: 4px; }
.login-btn { width: 100%; padding: 15px; background: var(--accent); color: #fff; border: none; border-radius: var(--rs); font-family: 'Pretendard', sans-serif; font-size: 16px; font-weight: 700; cursor: pointer; transition: background .2s; }
.login-btn:hover { background: #1e4a36; }
.login-error { font-size: 13px; color: var(--warn); margin-top: 12px; min-height: 20px; font-weight: 500; }
.login-remember { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 20px; cursor: pointer; }
.login-remember input { width: 16px; height: 16px; cursor: pointer; accent-color: var(--accent); }
.login-remember span { font-size: 13px; color: var(--ink-m); }

/* ── [SECTION 3] Header & Navigation (원본 복원) ── */
header { background: var(--card); border-bottom: 1px solid var(--bd); height: 64px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 500; padding: 0 2.5%; }
.brand { font-family: 'Nanum Myeongjo', serif; font-size: 18px; font-weight: 800; color: var(--accent); display: flex; align-items: center; gap: 10px; }
.bdot { width: 8px; height: 8px; background: var(--accent-m); border-radius: 50%; box-shadow: 0 0 8px var(--accent-m); }
.hright { display: flex; align-items: center; gap: 12px; }
.qbadge { background: var(--warn-l); color: var(--warn); font-size: 11px; font-weight: 800; padding: 5px 12px; border-radius: 20px; border: 1px solid rgba(196,92,38,0.2); }
.hsm { padding: 8px 16px; background: var(--warm); border: 1px solid var(--bd); border-radius: var(--rs); font-family: 'Pretendard', sans-serif; font-size: 13px; font-weight: 600; color: var(--ink-m); cursor: pointer; transition: all .2s; }
.hsm:hover { background: var(--accent-l); color: var(--accent); border-color: var(--accent-m); }
.hsm.ghost { background: transparent; border: none; }

.fbar { background: var(--card); border-bottom: 1px solid var(--bd); display: flex; align-items: center; overflow-x: auto; padding: 0 2.5%; scrollbar-width: none; }
.fbar::-webkit-scrollbar { display: none; }
.ftab { padding: 16px 20px; font-size: 14px; font-weight: 600; color: var(--ink-m); cursor: pointer; border-bottom: 3px solid transparent; white-space: nowrap; background: none; border-left: none; border-right: none; border-top: none; font-family: 'Pretendard', sans-serif; transition: all .2s; }
.ftab.on { color: var(--accent); border-bottom-color: var(--accent); }
.tcnt { display: inline-flex; align-items: center; justify-content: center; min-width: 20px; height: 20px; padding: 0 6px; background: var(--warm); border-radius: 10px; font-size: 11px; font-weight: 700; margin-left: 6px; color: var(--ink-m); }
.ftab.on .tcnt { background: var(--accent-l); color: var(--accent); }

/* ── [SECTION 4] Main CRM Table (원본 디테일) ── */
.thead { display: flex; align-items: baseline; gap: 12px; margin-bottom: 16px; }
.ttitle { font-family: 'Nanum Myeongjo', serif; font-size: 22px; font-weight: 800; color: var(--ink); }
.tmeta { font-size: 13px; color: var(--ink-m); }

.crm-tbl { width: 100%; border-collapse: separate; border-spacing: 0; background: var(--card); border: 1px solid var(--bd); border-radius: var(--r); overflow: hidden; box-shadow: var(--sh); table-layout: fixed; }
.crm-tbl thead tr { background: var(--warm); }
.crm-tbl th { padding: 14px; font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-m); text-align: left; border-bottom: 1px solid var(--bd); }
.crm-tbl tbody tr { border-bottom: 1px solid var(--bd); transition: background .15s; }
.crm-tbl tbody tr:hover { background: #fdfcfa; }
.crm-tbl td { padding: 18px 14px; vertical-align: top; border-bottom: 1px dotted var(--bd); }
.crm-tbl tr:last-child td { border-bottom: none; }

/* ── [SECTION 5] New Components (메모 & 수정창) ── */
.memo-wrap-outer { position: relative; }
.memo-box { background: var(--warm); border-left: 3px solid var(--bd); border-radius: 0 var(--rs) var(--rs) 0; padding: 12px 14px; font-size: 13px; color: var(--ink-m); line-height: 1.7; white-space: pre-wrap; word-break: break-all; max-height: 5.2em; overflow: hidden; transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1); position: relative; }
.memo-box.open { max-height: 2000px; background: #fff; border-color: var(--accent-m); }
.memo-box:not(.open).has-more::after { content: ""; position: absolute; bottom: 0; left: 0; width: 100%; height: 30px; background: linear-gradient(transparent, var(--warm)); pointer-events: none; }
.more-btn { display: block; width: 100%; padding: 6px; margin-top: 8px; background: var(--bd); border: none; border-radius: 4px; color: var(--ink-m); font-size: 11px; font-weight: 600; cursor: pointer; text-align: center; transition: all .2s; }
.more-btn:hover { background: var(--ink-f); color: #fff; }

.draft-wrap { position: relative; }
.draft-text { font-size: 14px; line-height: 1.8; color: var(--ink); background: var(--card); border: 1.5px solid var(--bd); border-radius: var(--rs); padding: 14px 40px 14px 14px; white-space: pre-wrap; word-break: break-all; min-height: 100px; transition: border-color .2s; }
.draft-wrap:hover .draft-text { border-color: var(--accent-m); }
.edit-btn { position: absolute; top: 10px; right: 10px; width: 28px; height: 28px; border: 1px solid var(--bd); border-radius: var(--rs); background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--ink-m); opacity: 0; transition: all .2s; box-shadow: var(--sh); }
.draft-wrap:hover .edit-btn { opacity: 1; }
.edit-btn:hover { color: var(--accent); border-color: var(--accent); }

.ep { margin-top: 12px; padding: 16px; border: 1px solid var(--accent-m); background: #f9fdfb; border-radius: var(--rs); display: none; animation: slideDown 0.3s ease-out; }
.ep.on { display: block; }
@keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
.erow { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.elabel { font-size: 11px; font-weight: 800; letter-spacing: 0.05em; text-transform: uppercase; color: var(--ink-m); margin-bottom: 8px; display: block; }
.etxt { width: 100%; padding: 12px; background: #fff; border: 1.5px solid var(--bd); border-radius: var(--rs); font-family: 'Pretendard', sans-serif; font-size: 13px; color: var(--ink); resize: vertical; min-height: 140px; outline: none; line-height: 1.6; transition: border-color .2s; }
.etxt:focus { border-color: var(--accent); }
.esave-wrap { margin-top: 14px; display: flex; justify-content: flex-end; align-items: center; gap: 12px; }
.esave { padding: 8px 20px; background: var(--accent); color: #fff; border: none; border-radius: var(--rs); font-family: 'Pretendard', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; transition: background .2s; }

/* ── [SECTION 6] Badges & Utilities (원본 복원) ── */
.badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; white-space: nowrap; }
.bg { background: var(--accent-l); color: var(--accent); }
.bo { background: var(--warn-l); color: var(--warn); }
.bb { background: var(--info-l); color: var(--info); }
.bp { background: var(--purple-l); color: var(--purple); }
.bgo { background: var(--gold-l); color: var(--gold); }
.bgr { background: var(--warm); color: var(--ink-m); }

.chk-wrap { display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; }
.chk-wrap input { width: 18px; height: 18px; cursor: pointer; accent-color: var(--accent); }
.chk-label { font-size: 12px; font-weight: 700; color: var(--ink-m); }

/* ── [SECTION 7] Floating Bar & Modal (원본 복원) ── */
.add-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); border-top: 1px solid var(--bd); padding: 10px 2.5%; display: flex; align-items: center; gap: 14px; box-shadow: 0 -4px 20px rgba(26,23,20,.08); z-index: 600; height: 64px; }
.chart-inp { padding: 10px 16px; border: 2px solid var(--bd); border-radius: var(--rs); font-family: 'Pretendard', sans-serif; font-size: 14px; font-weight: 600; width: 200px; outline: none; transition: border-color .2s; }
.chart-inp:focus { border-color: var(--accent); }
.btn-plus { width: 42px; height: 42px; background: var(--accent); color: #fff; border: none; border-radius: var(--rs); font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .2s; }
.btn-plus:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(45,106,79,0.3); }

#toast { position: fixed; bottom: 84px; left: 50%; transform: translateX(-50%); padding: 12px 24px; border-radius: 40px; color: #fff; font-size: 14px; font-weight: 600; box-shadow: var(--sh-lg); z-index: 2000; opacity: 0; visibility: hidden; transition: all 0.3s; }
#toast.on { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(-10px); }
#toast.ok { background: var(--accent); }
#toast.err { background: var(--warn); }

/* ── [SECTION 8] Loading Spinner ── */
#load-st { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 100px 0; }
.spin { width: 40px; height: 40px; border: 4px solid var(--bd); border-top-color: var(--accent); border-radius: 50%; animation: rot 0.8s linear infinite; margin-bottom: 16px; }
@keyframes rot { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">🌿 아이누리</div>
    <p class="login-sub">아이누리 CRM 워크스페이스<br>보안 비밀번호를 입력해 주세요.</p>
    <div class="pw-wrap">
      <input type="password" id="pw-input" class="pw-input" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()">
      <button class="pw-toggle" onclick="togglePw()" id="pw-eye">👁</button>
    </div>
    <button class="login-btn" onclick="doLogin()">인증 후 입장</button>
    <p class="login-error" id="login-err"></p>
    <label class="login-remember"><input type="checkbox" id="remember-chk" checked><span>로그인 상태 유지</span></label>
  </div>
</div>

<header>
  <div class="brand"><div class="bdot"></div>아이누리 CRM <span style="font-weight:400; font-size:14px; margin-left:8px; color:var(--ink-f)">v2.5</span></div>
  <div class="hright">
    <span class="qbadge" id="qcnt">데이터 확인 중...</span>
    <button class="hsm" onclick="load()">↺ 새로고침</button>
    <button class="hsm ghost" onclick="logout()">로그아웃</button>
  </div>
</header>

<div class="fbar">
  <button class="ftab on" onclick="setF('전체',this)">전체 <span class="tcnt" id="c-전체">0</span></button>
  <button class="ftab" onclick="setF('복약안내',this)">💊 복약안내 <span class="tcnt" id="c-복약안내">0</span></button>
  <button class="ftab" onclick="setF('중간점검',this)">🔍 중간점검 <span class="tcnt" id="c-중간점검">0</span></button>
  <button class="ftab" onclick="setF('종료전안내',this)">⏰ 종료전안내 <span class="tcnt" id="c-종료전안내">0</span></button>
  <button class="ftab" onclick="setF('마무리상담',this)">🎯 마무리상담 <span class="tcnt" id="c-마무리상담">0</span></button>
</div>

<main>
  <div id="load-st">
    <div class="spin"></div>
    <p style="color:var(--ink-m); font-weight:600;">노션 데이터베이스 연결 중...</p>
  </div>
  
  <div id="tbl-wrap" style="display:none">
    <div class="thead">
      <span class="ttitle" id="ttitle">전체 리스트</span>
      <span class="tmeta" id="tmeta">오늘 처리할 환자 정보를 확인하세요.</span>
    </div>
    <table class="crm-tbl">
      <thead>
        <tr>
          <th style="width:50px; text-align:center">No.</th>
          <th style="width:110px">환자 정보</th>
          <th style="width:120px">처방 상세</th>
          <th style="width:280px">진료 메모 (과거 기록 누적)</th>
          <th>AI CRM 초안 및 수정</th>
          <th style="width:140px; text-align:center">상태 관리</th>
        </tr>
      </thead>
      <tbody id="tbody">
        </tbody>
    </table>
  </div>
</main>

<div class="ai-input-section" style="padding: 20px; background: var(--accent-l); margin-bottom: 20px; border-radius: var(--r);">
  <h4 style="color: var(--accent); margin-bottom: 10px;">🤖 AI에게 정보 전달</h4>
  <textarea id="ai-text-input" class="etxt" style="min-height: 80px;" placeholder="환자 특이사항이나 파일 내용을 입력하고 AI에게 전달하세요."></textarea>
  <div style="margin-top: 10px; display: flex; gap: 10px;">
    <input type="file" id="ai-file-input" style="font-size: 12px;">
    <button class="esave" onclick="sendToAI()">AI에게 전달하기</button>
  </div>
</div>
  
<div class="add-bar">
  <span style="font-size:13px; font-weight:800; color:var(--accent);">QUICK ADD</span>
  <input type="text" id="chart-q" class="chart-inp" placeholder="차트번호 입력" onkeydown="if(event.key==='Enter')addFromChart()">
  <button class="btn-plus" onclick="addFromChart()">+</button>
  <div style="margin-left:auto; color:var(--ink-f); font-size:12px;">© i-nuri Network. Data Sovereignty Protected.</div>
</div>

<div id="toast"></div>

<script>
/* ── [JS] Config & State ── */
const DB_ID = '04f406a5be9b454b9dda793fac2d4fb4'; // 원본 DB ID 유지
let patients = [];
let curFilter = '전체';
let sessionPw = '';

/* ── [JS] Initialize ── */
window.onload = () => {
  const saved = localStorage.getItem('crm_pw_hint');
  if (saved) {
    sessionPw = saved;
    document.getElementById('login-screen').classList.add('off');
    load();
  }
};

/* ── [JS] Core Logic (원본 복원) ── */
async function load() {
  show('load-st'); hide('tbl-wrap');
  try {
    const res = await notion(`/databases/${DB_ID}/query`, 'POST', {
      sorts: [{ property: '한약수령일', direction: 'descending' }]
    });
    patients = res.results.map(parse);
    renderTable();
    updateCounts();
  } catch (e) {
    toast('데이터를 불러오지 못했습니다.', 'err');
  }
}

function parse(page) {
  const p = page.properties;
  const g = (k, t) => {
    if (!p[k]) return '';
    if (t === 'title') return p[k].title?.[0]?.plain_text || '';
    if (t === 'rt') return p[k].rich_text?.map(x => x.plain_text).join('') || '';
    if (t === 'sel') return p[k].select?.name || '';
    if (t === 'num') return p[k].number ?? '';
    if (t === 'date') return p[k].date?.start || '';
    return '';
  };
  return {
    id: page.id,
    환자명: g('환자명', 'title'),
    차트번호: g('차트번호', 'rt'),
    처방종류: g('처방종류', 'sel'),
    처방일수: g('처방일수', 'sel'),
    처방차수: g('처방차수', 'num'),
    한약수령일: g('한약수령일', 'date'),
    상태: g('상태', 'sel'),
    체질: g('체질', 'sel'),
    메모: g('진료 메모', 'rt'),
    CRM발송유형: g('CRM발송유형', 'sel'),
    CRM초안: g('CRM초안', 'rt'),
    발송상태: g('발송상태', 'sel')
  };
}

/* ── [JS] UI Rendering (메모 펼침/수정창 포함) ── */
function renderTable() {
  hide('load-st'); show('tbl-wrap');
  const list = curFilter === '전체' ? patients : patients.filter(p => p.CRM발송유형 === curFilter);
  const target = document.getElementById('tbody');
  
  target.innerHTML = list.map((p, i) => {
    const memoLines = (p.메모 || '').split('\n');
    const hasMore = memoLines.length > 4 || (p.메모 && p.메모.length > 100);
    
    return `
    <tr id="row-${p.id}">
      <td style="text-align:center; color:var(--ink-f); font-weight:700;">${i+1}</td>
      <td>
        <div style="font-weight:800; font-size:15px; margin-bottom:4px;">${esc(p.환자명)}</div>
        <div style="font-size:12px; color:var(--ink-m);">${esc(p.차트번호)}</div>
        <div style="margin-top:8px;">${p.체질 ? badge(p.체질, 'gr') : ''}</div>
      </td>
      <td>
        <div style="margin-bottom:6px;">${badge(p.CRM발송유형 || '미정')}</div>
        <div style="font-size:12px; color:var(--ink-m); line-height:1.4;">
          ${esc(p.처방종류)}<br>
          <span style="font-weight:700;">${esc(p.처방일수)}</span> (${esc(p.처방차수)}차)
        </div>
      </td>
      <td>
        <div class="memo-wrap-outer">
          <div id="m-box-${p.id}" class="memo-box ${hasMore ? 'has-more' : ''}">
            ${esc(p.메모 || '진료 기록이 없습니다.')}
          </div>
          ${hasMore ? `<button class="more-btn" onclick="toggleMemo('${p.id}')">▼ 과거 진료 기록 누적 보기</button>` : ''}
        </div>
      </td>
      <td>
        <div class="draft-wrap">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
            <button class="hsm" style="font-size: 11px; background: var(--accent-l); color: var(--accent);" 
              onclick="generateAI('${p.id}')">✨ AI 초안 생성</button>
          </div>
          <div class="draft-text" id="view-dt-${p.id}">${esc(p.CRM초안 || '생성된 초안이 없습니다.')}</div>
          <button class="edit-btn" onclick="toggleEp('${p.id}')" title="내용 수정">✎</button>
          
          <div class="ep" id="ep-${p.id}">
            <div class="erow">
              <div>
                <label class="elabel">최종 발송용 문구 수정</label>
                <textarea class="etxt" id="dt-${p.id}">${esc(p.CRM초안)}</textarea>
              </div>
              <div>
                <label class="elabel" style="color:var(--warn)">수정 사유 (진료 메모에 자동 누적)</label>
                <textarea class="etxt" id="rs-${p.id}" placeholder="예: 환자분의 최근 소화불량 호소 내용을 반영하여 문구 수정함."></textarea>
              </div>
            </div>
            <div class="esave-wrap">
              <span style="font-size:11px; color:var(--ink-f);">* 저장 시 노션의 초안과 진료 메모가 동시에 업데이트됩니다.</span>
              <button class="esave" onclick="saveDraft('${p.id}')">💾 변경사항 저장</button>
            </div>
          </div>
        </div>
      </td>
      <td style="text-align:center;">
        <label class="chk-wrap" style="justify-content:center; margin-bottom:10px;">
          <input type="checkbox" ${p.발송상태 === '발송완료' ? 'checked' : ''} onchange="updateStat('${p.id}', this.checked ? '발송완료' : '대기')">
          <span class="chk-label">${p.발송상태 === '발송완료' ? '발송완료' : '발송대기'}</span>
        </label>
        <button class="hsm" style="width:100%; font-size:11px;" onclick="copyDraft('${p.id}')">📋 복사하기</button>
      </td>
    </tr>`;
  }).join('');
}

/* ── [JS] Helper & Action Functions (원본 복원) ── */
async function saveDraft(id) {
  const newDraft = document.getElementById('dt-' + id).value;
  const reason = document.getElementById('rs-' + id).value;
  const p = patients.find(x => x.id === id);
  
  if (!reason.trim()) {
    toast('수정 사유를 간단히 입력해주세요.', 'err');
    return;
  }

  const today = new Date().toLocaleDateString('ko-KR', { month: '2-digit', day: '2-digit' }).replace(/\. /g, '-').replace('.','');
  const newMemo = `[${today} 수정] ${reason}\n${p.메모}`;

  try {
    await notion(`/pages/${id}`, 'PATCH', {
      properties: {
        'CRM초안': { rich_text: [{ text: { content: newDraft } }] },
        '진료 메모': { rich_text: [{ text: { content: newMemo } }] }
      }
    });
    p.CRM초안 = newDraft;
    p.메모 = newMemo;
    toast('노션에 성공적으로 반영되었습니다.', 'ok');
    renderTable();
  } catch(e) {
    toast('저장 중 오류가 발생했습니다.', 'err');
  }
}

function toggleMemo(id) {
  const box = document.getElementById('m-box-' + id);
  box.classList.toggle('open');
  const btn = box.nextElementSibling;
  btn.innerText = box.classList.contains('open') ? '▲ 기록 닫기' : '▼ 과거 진료 기록 누적 보기';
}

function toggleEp(id) {
  const ep = document.getElementById('ep-' + id);
  ep.classList.toggle('on');
}

function badge(type, force) {
  const m = {
    '복약안내':'bg','중간점검':'bb','종료전안내':'bo','마무리상담':'bp','사후관리':'bgo',
    '태양인':'bo','태음인':'bb','소양인':'bgo','소음인':'bg',
  };
  const cls = force === 'gr' ? 'bgr' : (m[type] || 'bgr');
  return `<span class="badge ${cls}">${esc(type)}</span>`;
}

function updateCounts() {
  const counts = { '전체': patients.length };
  patients.forEach(p => {
    if (p.CRM발송유형) counts[p.CRM발송유형] = (counts[p.CRM발송유형] || 0) + 1;
  });
  Object.keys(counts).forEach(k => {
    const el = document.getElementById('c-' + k);
    if (el) el.innerText = counts[k];
  });
  document.getElementById('qcnt').innerText = `미처리 업무: ${patients.filter(x => x.발송상태 !== '발송완료').length}건`;
}

async function updateStat(id, val) {
  try {
    await notion(`/pages/${id}`, 'PATCH', { properties: { '발송상태': { select: { name: val } } } });
    const p = patients.find(x => x.id === id);
    if (p) p.발송상태 = val;
    updateCounts();
    toast(`상태가 [${val}]로 변경되었습니다.`, 'ok');
  } catch(e) { toast('상태 변경 실패', 'err'); }
}


/* 수정된 notion 함수 (Vercel Serverless Function 활용) */
async function notion(path, method, body) {
  // 절대 주소(https://api.notion.com...)를 지우고, 
  // 이미 만들어두신 Vercel 내부 경로(/api/notion)로 보냅니다.
  const res = await fetch('/api/notion', { 
    method: 'POST', // Vercel 함수는 대개 POST로 모든 정보를 받도록 설계됩니다.
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      path: path,      // 예: /databases/04f406.../query
      method: method,  // 예: POST, PATCH
      token: sessionPw, // 사용자가 입력한 API Secret
      body: body       // 실제 전송할 데이터
    })
  });

  if (!res.ok) {
    const errData = await res.json();
    console.error('Notion API Error:', errData);
    throw new Error('API 연결 실패');
  }
  return res.json();
}

function doLogin() {
  const val = document.getElementById('pw-input').value;
  if (!val) return;
  sessionPw = val;
  if (document.getElementById('remember-chk').checked) {
    localStorage.setItem('crm_pw_hint', val);
  }
  document.getElementById('login-screen').classList.add('off');
  load();
}

function logout() {
  localStorage.removeItem('crm_pw_hint');
  location.reload();
}

function togglePw() {
  const input = document.getElementById('pw-input');
  const eye = document.getElementById('pw-eye');
  if (input.type === 'password') {
    input.type = 'text'; eye.innerText = '🔒';
  } else {
    input.type = 'password'; eye.innerText = '👁';
  }
}

function toast(msg, type) {
  const t = document.getElementById('toast');
  t.innerText = msg;
  t.className = 'on ' + type;
  setTimeout(() => t.className = '', 3000);
}

function esc(str) {
  if (!str) return '';
  return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[m]));
}

function show(id) { document.getElementById(id).style.display = 'flex'; }
function hide(id) { document.getElementById(id).style.display = 'none'; }
function setF(f, el) {
  curFilter = f;
  document.querySelectorAll('.ftab').forEach(t => t.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('ttitle').innerText = f + ' 리스트';
  renderTable();
}

function copyDraft(id) {
  const txt = document.getElementById('view-dt-' + id).innerText;
  navigator.clipboard.writeText(txt).then(() => toast('클립보드에 복사되었습니다.', 'ok'));
}
</script>
