<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아이누리 CRM 워크스페이스</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#1a1714; --ink-m:#6b6560; --ink-f:#c5bfb9;
  --paper:#faf8f5; --warm:#f2ede6; --card:#ffffff;
  --accent:#2d6a4f; --accent-l:#e8f4ee; --accent-m:#52b788;
  --warn:#c45c26; --warn-l:#fdf0e8;
  --info:#1e6091; --info-l:#e8f1f8;
  --purple:#6b3fa0; --purple-l:#f0eaf8;
  --gold:#b5831a; --gold-l:#fdf6e3;
  --bd:#e8e2da;
  --sh:0 1px 3px rgba(26,23,20,.07),0 4px 16px rgba(26,23,20,.04);
  --sh-lg:0 8px 32px rgba(26,23,20,.13);
  --r:10px; --rs:6px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Pretendard',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;font-size:14px;line-height:1.6;}

/* ── 로그인 화면 ── */
#login-screen {
  position:fixed;inset:0;
  background:var(--paper);
  display:flex;align-items:center;justify-content:center;
  z-index:500;
}
#login-screen.off{display:none;}
.login-box{
  background:var(--card);border-radius:20px;
  padding:48px 44px;max-width:400px;width:100%;
  box-shadow:var(--sh-lg);border:1px solid var(--bd);
  text-align:center;
}
.login-logo{
  font-family:'Nanum Myeongjo',serif;
  font-size:28px;font-weight:800;color:var(--accent);
  margin-bottom:6px;
}
.login-sub{
  font-size:13px;color:var(--ink-m);
  margin-bottom:36px;line-height:1.6;
}
.pw-wrap{
  position:relative;margin-bottom:14px;
}
.pw-input{
  width:100%;padding:13px 44px 13px 16px;
  border:1.5px solid var(--bd);border-radius:var(--rs);
  font-family:'Pretendard',sans-serif;font-size:15px;
  color:var(--ink);background:var(--paper);
  outline:none;transition:border-color .15s;
  text-align:center;letter-spacing:.1em;
}
.pw-input:focus{border-color:var(--accent);background:#fff;}
.pw-toggle{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;
  color:var(--ink-f);font-size:16px;padding:4px;
}
.login-btn{
  width:100%;padding:13px;
  background:var(--accent);color:#fff;border:none;
  border-radius:var(--rs);
  font-family:'Pretendard',sans-serif;font-size:15px;font-weight:600;
  cursor:pointer;transition:background .15s;
}
.login-btn:hover{background:#235c41;}
.login-btn:active{transform:scale(.99);}
.login-error{
  font-size:12px;color:var(--warn);
  margin-top:10px;min-height:18px;
}
.login-remember{
  display:flex;align-items:center;justify-content:center;
  gap:7px;margin-top:14px;cursor:pointer;
}
.login-remember input{
  width:14px;height:14px;cursor:pointer;accent-color:var(--accent);
}
.login-remember span{font-size:12px;color:var(--ink-m);}

/* ── 모달 공통 ── */
.overlay{position:fixed;inset:0;background:rgba(26,23,20,.6);backdrop-filter:blur(7px);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px;}
.overlay.off{display:none;}
.mbox{background:var(--card);border-radius:16px;padding:36px;max-width:460px;width:100%;box-shadow:var(--sh-lg);border:1px solid var(--bd);max-height:92vh;overflow-y:auto;}
.mtitle{font-family:'Nanum Myeongjo',serif;font-size:19px;font-weight:800;color:var(--accent);margin-bottom:5px;}
.msub{font-size:13px;color:var(--ink-m);margin-bottom:22px;line-height:1.7;}
.flabel{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-m);margin-bottom:5px;display:block;}
.finput,.fsel,.ftxt{width:100%;padding:10px 12px;border:1.5px solid var(--bd);border-radius:var(--rs);font-family:'Pretendard',sans-serif;font-size:13px;color:var(--ink);background:var(--paper);outline:none;transition:border-color .15s;margin-bottom:14px;}
.finput:focus,.fsel:focus,.ftxt:focus{border-color:var(--accent);background:#fff;}
.ftxt{resize:vertical;min-height:76px;line-height:1.6;}
.frow{display:flex;gap:12px;}.frow>div{flex:1;}
.btn-p{width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:var(--rs);font-family:'Pretendard',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s;}
.btn-p:hover{background:#235c41;}
.btn-s{width:100%;padding:11px;background:transparent;color:var(--ink-m);border:1px solid var(--bd);border-radius:var(--rs);font-family:'Pretendard',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;margin-top:8px;}
.btn-s:hover{background:var(--warm);color:var(--ink);}

/* ── 헤더 ── */
header{background:var(--card);border-bottom:1px solid var(--bd);padding:0 28px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.brand{font-family:'Nanum Myeongjo',serif;font-size:16px;font-weight:800;color:var(--accent);display:flex;align-items:center;gap:9px;}
.bdot{width:7px;height:7px;background:var(--accent-m);border-radius:50%;}
.hright{display:flex;align-items:center;gap:10px;}
.qbadge{background:var(--warn-l);color:var(--warn);font-size:11px;font-weight:700;padding:4px 11px;border-radius:20px;border:1px solid #f0c8a8;}
.hsm{padding:6px 12px;background:var(--warm);border:1px solid var(--bd);border-radius:var(--rs);font-family:'Pretendard',sans-serif;font-size:12px;font-weight:600;color:var(--ink-m);cursor:pointer;transition:all .15s;}
.hsm:hover{background:var(--accent-l);color:var(--accent);border-color:var(--accent-m);}
.hsm.ghost{background:transparent;}
.hsm.ghost:hover{background:var(--warm);}

/* ── 필터 탭 ── */
.fbar{background:var(--card);border-bottom:1px solid var(--bd);padding:0 28px;display:flex;align-items:center;overflow-x:auto;}
.ftab{padding:12px 14px;font-size:12px;font-weight:600;color:var(--ink-m);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;background:none;border-left:none;border-right:none;border-top:none;font-family:'Pretendard',sans-serif;transition:all .15s;}
.ftab:hover{color:var(--ink);}
.ftab.on{color:var(--accent);border-bottom-color:var(--accent);}
.tcnt{display:inline-flex;align-items:center;justify-content:center;width:17px;height:17px;background:var(--warm);border-radius:50%;font-size:10px;font-weight:700;margin-left:5px;color:var(--ink-m);}
.ftab.on .tcnt{background:var(--accent-l);color:var(--accent);}

/* ── 메인 ── */
main{padding:20px 28px 72px;}
#load-st{text-align:center;padding:70px 20px;color:var(--ink-m);}
.spin{width:28px;height:28px;border:2.5px solid var(--bd);border-top-color:var(--accent);border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 12px;}
@keyframes sp{to{transform:rotate(360deg);}}
#empty-st{text-align:center;padding:70px 20px;display:none;}
.ei{font-size:40px;margin-bottom:12px;opacity:.3;}
.et{font-family:'Nanum Myeongjo',serif;font-size:16px;color:var(--ink-m);margin-bottom:6px;}
.es{font-size:12px;color:var(--ink-f);}
#tbl-wrap{display:none;}
.thead{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.ttitle{font-family:'Nanum Myeongjo',serif;font-size:14px;font-weight:700;}
.tmeta{font-size:12px;color:var(--ink-f);}

/* ── 테이블 ── */
.crm-tbl{width:100%;border-collapse:separate;border-spacing:0;background:var(--card);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);}
.crm-tbl thead tr{background:var(--warm);}
.crm-tbl th{padding:10px 14px;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-m);text-align:left;border-bottom:1px solid var(--bd);white-space:nowrap;}
.crm-tbl tbody tr{border-bottom:1px solid var(--bd);transition:background .12s;}
.crm-tbl tbody tr:last-child{border-bottom:none;}
.crm-tbl tbody tr:hover{background:#fdfcfa;}
.crm-tbl td{padding:14px;vertical-align:top;}
.no-cell{text-align:center;font-size:13px;color:var(--ink-f);font-style:italic;font-weight:600;}

/* ── 셀 ── */
.pname{font-family:'Nanum Myeongjo',serif;font-size:15px;font-weight:700;}
.chartno{font-size:12px;color:var(--ink-m);font-weight:600;margin-top:2px;}
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;}
.bg{background:var(--accent-l);color:var(--accent);}
.bo{background:var(--warn-l);color:var(--warn);}
.bb{background:var(--info-l);color:var(--info);}
.bp{background:var(--purple-l);color:var(--purple);}
.bgo{background:var(--gold-l);color:var(--gold);}
.bgr{background:var(--warm);color:var(--ink-m);}
.memo-box{background:var(--warm);border-left:3px solid var(--bd);border-radius:0 var(--rs) var(--rs) 0;padding:8px 11px;font-size:12px;color:var(--ink-m);line-height:1.7;white-space:pre-wrap;word-break:break-all;}

/* ── 초안 ── */
.draft-wrap{position:relative;}
.draft-text{font-size:13px;line-height:1.75;color:var(--ink);background:var(--card);border:1.5px solid var(--bd);border-radius:var(--rs);padding:10px 36px 10px 12px;white-space:pre-wrap;word-break:break-all;}
.draft-none{font-size:12px;color:var(--ink-f);font-style:italic;padding:10px 12px;border:1.5px dashed var(--bd);border-radius:var(--rs);}
.edit-btn{position:absolute;top:7px;right:7px;width:24px;height:24px;border:1px solid var(--bd);border-radius:var(--rs);background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink-m);transition:all .15s;opacity:0;font-size:13px;}
.draft-wrap:hover .edit-btn{opacity:1;}
.edit-btn:hover{background:var(--accent-l);color:var(--accent);border-color:var(--accent-m);}
.ep{margin-top:10px;padding-top:10px;border-top:1px dashed var(--bd);display:none;}
.ep.on{display:block;}
.erow{display:flex;gap:10px;}
.ecol{flex:1;}
.elabel{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-m);margin-bottom:5px;display:block;}
.etxt{width:100%;padding:8px 10px;background:var(--paper);border:1.5px solid var(--bd);border-radius:var(--rs);font-family:'Pretendard',sans-serif;font-size:12px;color:var(--ink);resize:vertical;min-height:72px;outline:none;transition:border-color .15s;line-height:1.6;}
.etxt:focus{border-color:var(--accent);background:#fff;}
.eact{display:flex;gap:8px;margin-top:7px;justify-content:flex-end;}
.esave{padding:6px 14px;background:var(--accent);color:#fff;border:none;border-radius:var(--rs);font-family:'Pretendard',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:background .15s;}
.esave:hover{background:#235c41;}
.ecanc{padding:6px 12px;background:transparent;color:var(--ink-m);border:1px solid var(--bd);border-radius:var(--rs);font-family:'Pretendard',sans-serif;font-size:12px;cursor:pointer;transition:all .15s;}
.ecanc:hover{background:var(--warm);}
.ehint{font-size:10px;color:var(--ink-f);margin-top:5px;text-align:right;font-style:italic;}

/* ── 발송 상태 ── */
.stat-wrap{display:flex;flex-direction:column;gap:7px;min-width:130px;}
.stat-sel{width:100%;padding:7px 9px;border:1.5px solid var(--bd);border-radius:var(--rs);font-family:'Pretendard',sans-serif;font-size:12px;font-weight:600;color:var(--ink);background:var(--paper);cursor:pointer;outline:none;transition:border-color .15s;}
.stat-sel:focus{border-color:var(--accent);}
.chk-wrap{display:flex;align-items:center;gap:7px;padding:7px 9px;background:var(--warm);border-radius:var(--rs);cursor:pointer;}
.chk-wrap input[type=checkbox]{width:14px;height:14px;cursor:pointer;accent-color:var(--accent);}
.chk-label{font-size:11px;font-weight:600;color:var(--ink-m);cursor:pointer;}

/* ── 하단 추가 바 ── */
.add-bar{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--bd);padding:10px 28px;display:flex;align-items:center;gap:12px;box-shadow:0 -3px 14px rgba(26,23,20,.07);z-index:50;}
.bar-label{font-size:12px;color:var(--ink-m);font-weight:500;white-space:nowrap;}
.chart-inp{padding:8px 12px;border:1.5px solid var(--bd);border-radius:var(--rs);font-family:'Pretendard',sans-serif;font-size:13px;font-weight:600;width:140px;outline:none;transition:border-color .15s;background:var(--paper);}
.chart-inp:focus{border-color:var(--accent);background:#fff;}
.btn-plus{width:32px;height:32px;background:var(--accent);color:#fff;border:none;border-radius:50%;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(45,106,79,.35);transition:transform .15s,background .15s;flex-shrink:0;}
.btn-plus:hover{background:#235c41;transform:scale(1.08);}
.btn-plus:active{transform:scale(.95);}
.bar-or{font-size:12px;color:var(--ink-f);}
.btn-manual{padding:8px 14px;background:var(--warm);border:1px solid var(--bd);border-radius:var(--rs);font-family:'Pretendard',sans-serif;font-size:12px;font-weight:600;color:var(--ink-m);cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn-manual:hover{background:var(--accent-l);color:var(--accent);border-color:var(--accent-m);}

/* ── 토스트 ── */
#toast{position:fixed;bottom:68px;right:22px;background:var(--ink);color:#fff;padding:10px 17px;border-radius:var(--rs);font-size:13px;font-weight:500;opacity:0;transition:opacity .3s;z-index:9999;max-width:280px;pointer-events:none;}
#toast.on{opacity:1;}
#toast.err{background:var(--warn);}
#toast.ok{background:var(--accent);}
</style>
</head>
<body>

<!-- ── 로그인 화면 ── -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">🌿 아이누리</div>
    <p class="login-sub">CRM 워크스페이스<br>비밀번호를 입력해주세요</p>
    <div class="pw-wrap">
      <input type="password" id="pw-input" class="pw-input"
        placeholder="비밀번호"
        onkeydown="if(event.key==='Enter')doLogin()"/>
      <button class="pw-toggle" onclick="togglePw()" id="pw-eye">👁</button>
    </div>
    <button class="login-btn" onclick="doLogin()">입장</button>
    <p class="login-error" id="login-err"></p>
    <label class="login-remember">
      <input type="checkbox" id="remember-chk"/>
      <span>이 기기에서 로그인 유지</span>
    </label>
  </div>
</div>

<!-- ── 환자 추가 모달 ── -->
<div class="overlay off" id="add-modal">
  <div class="mbox">
    <div class="mtitle">+ 새 CRM 추가</div>
    <p class="msub">입력 후 노션 DB에 자동으로 등록됩니다.</p>
    <div class="frow">
      <div><label class="flabel">환자명 *</label><input type="text" id="a-name" class="finput" placeholder="홍길동"/></div>
      <div><label class="flabel">차트번호</label><input type="text" id="a-chart" class="finput" placeholder="2601"/></div>
    </div>
    <div class="frow">
      <div>
        <label class="flabel">처방종류</label>
        <select id="a-type" class="fsel"><option>한약</option><option>다이어트</option><option>일반치료</option><option>공진단</option><option>경옥고</option></select>
      </div>
      <div>
        <label class="flabel">처방일수</label>
        <select id="a-days" class="fsel"><option>15일</option><option>20일</option><option selected>30일</option></select>
      </div>
    </div>
    <div class="frow">
      <div>
        <label class="flabel">CRM 발송유형</label>
        <select id="a-crm" class="fsel"><option value="">— 미분류 —</option><option>복약안내</option><option>중간점검</option><option>종료전안내</option><option>마무리상담</option><option>사후관리</option></select>
      </div>
      <div>
        <label class="flabel">체질</label>
        <select id="a-con" class="fsel"><option value="">— 미입력 —</option><option>태양인</option><option>태음인</option><option>소양인</option><option>소음인</option></select>
      </div>
    </div>
    <div class="frow">
      <div><label class="flabel">처방차수</label><input type="number" id="a-ord" class="finput" placeholder="1" min="1"/></div>
      <div><label class="flabel">한약수령일</label><input type="date" id="a-date" class="finput"/></div>
    </div>
    <label class="flabel">진료 메모</label>
    <textarea id="a-memo" class="ftxt" placeholder="예) 2026-04-08: 소화 개선됨, 수면 불량"></textarea>
    <label class="flabel">CRM 초안</label>
    <textarea id="a-draft" class="ftxt" placeholder="발송할 문자/카카오톡 내용"></textarea>
    <button class="btn-p" onclick="submitAdd()">노션에 추가하기</button>
    <button class="btn-s" onclick="closeAdd()">취소</button>
  </div>
</div>

<!-- ── 헤더 ── -->
<header>
  <div class="brand"><div class="bdot"></div>아이누리 CRM 워크스페이스</div>
  <div class="hright">
    <span class="qbadge" id="qcnt">—</span>
    <button class="hsm" onclick="load()">↺ 새로고침</button>
    <button class="hsm ghost" onclick="logout()">로그아웃</button>
  </div>
</header>

<!-- ── 필터 탭 ── -->
<div class="fbar">
  <button class="ftab on" onclick="setF('전체',this)">전체 <span class="tcnt" id="c-전체">0</span></button>
  <button class="ftab" onclick="setF('복약안내',this)">💊 복약안내 <span class="tcnt" id="c-복약안내">0</span></button>
  <button class="ftab" onclick="setF('중간점검',this)">🔍 중간점검 <span class="tcnt" id="c-중간점검">0</span></button>
  <button class="ftab" onclick="setF('종료전안내',this)">⏰ 종료전안내 <span class="tcnt" id="c-종료전안내">0</span></button>
  <button class="ftab" onclick="setF('마무리상담',this)">🎯 마무리상담 <span class="tcnt" id="c-마무리상담">0</span></button>
  <button class="ftab" onclick="setF('사후관리',this)">🌱 사후관리 <span class="tcnt" id="c-사후관리">0</span></button>
  <button class="ftab" onclick="setF('미분류',this)">— 미분류 <span class="tcnt" id="c-미분류">0</span></button>
</div>

<!-- ── 메인 ── -->
<main>
  <div id="load-st"><div class="spin"></div><p style="font-size:13px;color:var(--ink-m)">환자 데이터를 불러오는 중...</p></div>
  <div id="empty-st">
    <div class="ei">📋</div>
    <div class="et">해당하는 환자가 없습니다</div>
    <p class="es">하단 + 버튼으로 직접 추가하거나 노션 DB를 확인해보세요</p>
  </div>
  <div id="tbl-wrap">
    <div class="thead">
      <span class="ttitle" id="ttitle">전체 환자</span>
      <span class="tmeta" id="tmeta"></span>
    </div>
    <table class="crm-tbl">
      <thead>
        <tr>
          <th style="width:44px;text-align:center">No.</th>
          <th style="width:90px">차트번호</th>
          <th style="width:120px">환자명</th>
          <th style="width:230px">진료 메모 요약</th>
          <th>AI 생성 CRM 초안 <span style="font-weight:400;font-size:10px;opacity:.6">(수정 시 자동 학습)</span></th>
          <th style="width:148px;text-align:center">검토 및 발송</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</main>

<!-- ── 하단 추가 바 ── -->
<div class="add-bar">
  <span class="bar-label">차트번호로 추가</span>
  <input type="text" id="chart-q" class="chart-inp" placeholder="차트번호 입력" onkeydown="if(event.key==='Enter')addFromChart()"/>
  <button class="btn-plus" onclick="addFromChart()">+</button>
  <span class="bar-or">또는</span>
  <button class="btn-manual" onclick="openAdd('')">✏ 직접 입력으로 추가</button>
</div>

<div id="toast"></div>

<script>
const DB_ID = '04f406a5be9b454b9dda793fac2d4fb4';

let patients = [];
let curFilter = '전체';
let sessionPw = ''; // 세션 동안 메모리에만 보관

// ── 초기화 ──
window.onload = () => {
  // 로그인 유지 체크
  const saved = localStorage.getItem('crm_session');
  if (saved === 'ok') {
    sessionPw = localStorage.getItem('crm_pw_hint') || '';
    if (sessionPw) { hide('login-screen'); load(); }
  }
};

// ── 로그인 ──
async function doLogin() {
  const pw = $('pw-input').value;
  if (!pw) return;
  $('login-err').textContent = '';

  // 서버에 비밀번호 검증 요청 (빈 경로로 테스트)
  try {
    const res = await fetch('/api/notion?path=/users/me', {
      headers: { 'x-crm-password': pw }
    });
    if (res.status === 401) {
      $('login-err').textContent = '비밀번호가 올바르지 않습니다';
      $('pw-input').focus();
      return;
    }
    // 로그인 성공
    sessionPw = pw;
    if ($('remember-chk').checked) {
      localStorage.setItem('crm_session', 'ok');
      localStorage.setItem('crm_pw_hint', pw);
    }
    hide('login-screen');
    load();
  } catch(e) {
    $('login-err').textContent = '서버 연결 실패: ' + e.message;
  }
}

function logout() {
  localStorage.removeItem('crm_session');
  localStorage.removeItem('crm_pw_hint');
  sessionPw = '';
  $('pw-input').value = '';
  show('login-screen');
}

function togglePw() {
  const inp = $('pw-input');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

// ── API 호출 (비밀번호를 헤더로 전송, API 키는 서버에서 처리) ──
async function notion(path, method = 'GET', body = null) {
  const url = '/api/notion?path=' + encodeURIComponent(path);
  const res = await fetch(url, {
    method,
    headers: {
      'Content-Type': 'application/json',
      'x-crm-password': sessionPw,
    },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (!res.ok) {
    const e = await res.json().catch(() => ({}));
    throw new Error(e.error || `HTTP ${res.status}`);
  }
  return res.json();
}

// ── 데이터 로드 ──
async function load() {
  show('load-st'); hide('tbl-wrap'); hide('empty-st');
  try {
    const data = await notion(`/databases/${DB_ID}/query`, 'POST', {
      sorts: [{ property: '한약수령일', direction: 'ascending' }],
      page_size: 100,
    });
    patients = data.results.map(parse);
    updateCounts(); renderTable();
  } catch(e) {
    hide('load-st');
    toast('로드 실패: ' + e.message, 'err');
    patients = []; updateCounts(); renderTable();
  }
}

function parse(page) {
  const p = page.properties;
  const g = (k, t) => {
    if (!p[k]) return '';
    if (t === 'title') return p[k].title?.map(x => x.plain_text).join('') || '';
    if (t === 'rt')   return p[k].rich_text?.map(x => x.plain_text).join('') || '';
    if (t === 'sel')  return p[k].select?.name || '';
    if (t === 'num')  return p[k].number ?? '';
    if (t === 'date') return p[k].date?.start || '';
    return '';
  };
  return {
    id: page.id,
    환자명: g('환자명','title'), 차트번호: g('차트번호','rt'),
    처방종류: g('처방종류','sel'), 처방일수: g('처방일수','sel'),
    처방차수: g('처방차수','num'), 한약수령일: g('한약수령일','date'),
    상태: g('상태','sel'), 체질: g('체질','sel'),
    메모: g('메모','rt'), CRM발송유형: g('CRM발송유형','sel'),
    CRM초안: g('CRM초안','rt'), 발송상태: g('발송상태','sel'),
  };
}

function updateCounts() {
  const types = ['복약안내','중간점검','종료전안내','마무리상담','사후관리'];
  $('c-전체').textContent = patients.length;
  types.forEach(t => $('c-'+t).textContent = patients.filter(p => p.CRM발송유형 === t).length);
  $('c-미분류').textContent = patients.filter(p => !p.CRM발송유형).length;
  const pd = patients.filter(p => p.발송상태 === '대기' || !p.발송상태).length;
  $('qcnt').textContent = `${pd}명 대기 중`;
}

function setF(f, el) {
  curFilter = f;
  document.querySelectorAll('.ftab').forEach(t => t.classList.remove('on'));
  el.classList.add('on');
  renderTable();
}

function renderTable() {
  hide('load-st');
  const list = curFilter === '전체' ? patients
    : curFilter === '미분류' ? patients.filter(p => !p.CRM발송유형)
    : patients.filter(p => p.CRM발송유형 === curFilter);
  if (list.length === 0) { hide('tbl-wrap'); show('empty-st'); return; }
  show('tbl-wrap'); hide('empty-st');
  $('ttitle').textContent = curFilter === '전체' ? '전체 환자' : curFilter + ' 대상';
  $('tmeta').textContent = `총 ${list.length}명`;
  $('tbody').innerHTML = list.map((p, i) => row(p, i + 1)).join('');
}

function row(p, no) {
  const id = p.id;
  const crmBadge = p.CRM발송유형 ? badge(p.CRM발송유형) : '<span class="badge bgr">미분류</span>';
  const draft = p.CRM초안
    ? `<div class="draft-text">${esc(p.CRM초안)}</div>`
    : `<div class="draft-none">CRM 초안이 없습니다.</div>`;
  const memo = p.메모
    ? `<div class="memo-box">${esc(p.메모)}</div>`
    : `<span style="font-size:12px;color:var(--ink-f);font-style:italic">메모 없음</span>`;
  const sv = v => p.발송상태 === v ? 'selected' : '';
  const chkd = p.발송상태 === '발송완료' ? 'checked' : '';
  return `<tr>
<td class="no-cell">${no}</td>
<td>
  <div class="chartno">${esc(p.차트번호 || '—')}</div>
  ${p.체질 ? `<div style="margin-top:4px">${badge(p.체질,'gr')}</div>` : ''}
</td>
<td>
  <div class="pname">${esc(p.환자명 || '(이름없음)')}</div>
  ${p.처방종류||p.처방일수 ? `<div style="font-size:11px;color:var(--ink-m);margin-top:2px">${esc([p.처방종류,p.처방일수].filter(Boolean).join(' · '))}</div>` : ''}
  ${p.상태 ? `<div style="margin-top:4px">${badge(p.상태)}</div>` : ''}
</td>
<td>${memo}</td>
<td>
  <div class="draft-wrap">
    ${draft}
    <button class="edit-btn" onclick="toggleEp('${id}')" title="수정">✎</button>
    <div class="ep" id="ep-${id}">
      <div class="erow">
        <div class="ecol">
          <span class="elabel">수정 내용 (최종본)</span>
          <textarea class="etxt" id="dt-${id}" placeholder="문구를 수정하세요...">${esc(p.CRM초안||'')}</textarea>
        </div>
        <div class="ecol">
          <span class="elabel" style="color:var(--warn)">수정 이유 (AI 가이드)</span>
          <textarea class="etxt" id="rs-${id}" placeholder="예: 말투가 너무 사무적입니다."></textarea>
        </div>
      </div>
      <div class="ehint">입력창을 벗어나면 AI가 자동으로 학습을 시작합니다.</div>
      <div class="eact">
        <button class="ecanc" onclick="toggleEp('${id}')">취소</button>
        <button class="esave" onclick="saveDraft('${id}')">💾 저장</button>
      </div>
    </div>
  </div>
</td>
<td>
  <div class="stat-wrap">
    <select class="stat-sel" onchange="updateStat('${id}',this.value)">
      <option value="대기" ${sv('대기')||(!p.발송상태?'selected':'')}>⏳ 검토대기</option>
      <option value="검토완료" ${sv('검토완료')}>✅ 확인완료</option>
      <option value="보류" ${sv('보류')}>🚫 보류</option>
    </select>
    <label class="chk-wrap">
      <input type="checkbox" ${chkd} onchange="updateStat('${id}',this.checked?'발송완료':'검토완료')">
      <span class="chk-label">발송 완료</span>
    </label>
  </div>
</td>
</tr>`;
}

function toggleEp(id) { $('ep-'+id).classList.toggle('on'); }

async function saveDraft(id) {
  const draft = $('dt-'+id).value.trim();
  try {
    await notion(`/pages/${id}`, 'PATCH', {
      properties: { 'CRM초안': { rich_text: [{ text: { content: draft } }] } }
    });
    const p = patients.find(x => x.id === id);
    if (p) p.CRM초안 = draft;
    toggleEp(id); renderTable();
    toast('노션에 저장됐습니다 ✓', 'ok');
  } catch(e) { toast('저장 실패: ' + e.message, 'err'); }
}

async function updateStat(id, status) {
  const p = patients.find(x => x.id === id);
  if (p) p.발송상태 = status;
  updateCounts();
  try {
    await notion(`/pages/${id}`, 'PATCH', {
      properties: { '발송상태': { select: { name: status } } }
    });
  } catch(e) { toast('상태 업데이트 실패: ' + e.message, 'err'); }
}

function openAdd(chartNo) { $('a-chart').value = chartNo || ''; show('add-modal'); }
function closeAdd() { hide('add-modal'); }

async function submitAdd() {
  const name = $('a-name').value.trim();
  if (!name) { toast('환자명을 입력해주세요', 'err'); return; }
  const props = {
    '환자명':   { title:     [{ text: { content: name } }] },
    '차트번호': { rich_text: [{ text: { content: $('a-chart').value.trim() } }] },
    '처방종류': { select: { name: $('a-type').value } },
    '처방일수': { select: { name: $('a-days').value } },
    '처방차수': { number: parseInt($('a-ord').value) || 1 },
    '상태':     { select: { name: '복약중' } },
    '발송상태': { select: { name: '대기' } },
  };
  const crm  = $('a-crm').value;
  const con  = $('a-con').value;
  const date = $('a-date').value;
  const memo = $('a-memo').value.trim();
  const draft= $('a-draft').value.trim();
  if (crm)  props['CRM발송유형'] = { select: { name: crm } };
  if (con)  props['체질']        = { select: { name: con } };
  if (date) props['한약수령일']  = { date: { start: date } };
  if (memo) props['메모']        = { rich_text: [{ text: { content: memo } }] };
  if (draft)props['CRM초안']     = { rich_text: [{ text: { content: draft } }] };

  try {
    const res = await notion('/pages', 'POST', {
      parent: { database_id: DB_ID },
      properties: props,
    });
    patients.unshift(parse(res));
    updateCounts(); closeAdd(); renderTable();
    toast(`${name}님이 노션에 추가됐습니다 ✓`, 'ok');
    ['a-name','a-chart','a-ord','a-date','a-memo','a-draft'].forEach(i => $(i).value = '');
  } catch(e) { toast('추가 실패: ' + e.message, 'err'); }
}

function addFromChart() {
  const chart = $('chart-q').value.trim();
  if (!chart) return;
  const found = patients.find(p => p.차트번호 === chart);
  if (found) { toast(`${found.환자명}님은 이미 목록에 있습니다`, ''); $('chart-q').value = ''; return; }
  $('chart-q').value = '';
  openAdd(chart);
}

function badge(type, force) {
  const m = {
    '복약안내':'bg','중간점검':'bb','종료전안내':'bo','마무리상담':'bp','사후관리':'bgo',
    '복약중':'bg','치료중':'bb','종료':'bgr',
    '태양인':'bo','태음인':'bb','소양인':'bgo','소음인':'bg',
  };
  return `<span class="badge ${force==='gr'?'bgr':m[type]||'bgr'}">${esc(type)}</span>`;
}

function $(id) { return document.getElementById(id); }
function show(id) {
  const el = $(id);
  if (!el) return;
  if (el.classList.contains('overlay') || el.id === 'login-screen') el.classList.remove('off');
  else el.style.display = '';
}
function hide(id) {
  const el = $(id);
  if (!el) return;
  if (el.classList.contains('overlay') || el.id === 'login-screen') el.classList.add('off');
  else el.style.display = 'none';
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
let _t;
function toast(msg, type='') {
  const el = $('toast'); el.textContent = msg;
  el.className = 'on' + (type ? ' '+type : '');
  clearTimeout(_t); _t = setTimeout(() => el.className = '', 3000);
}
</script>
</body>
</html>
