<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아이누리 CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1714; --ink-m: #6b6560; --ink-f: #c5bfb9;
  --paper: #faf8f5; --warm: #f2ede6; --card: #ffffff;
  --accent: #2d6a4f; --accent-l: #e8f4ee; --accent-m: #52b788;
  --warn: #c45c26; --warn-l: #fdf0e8;
  --info: #1e6091; --info-l: #e8f1f8;
  --purple: #6b3fa0; --purple-l: #f0eaf8;
  --gold: #b5831a; --gold-l: #fdf6e3;
  --bd: #e8e2da;
  --sh: 0 1px 3px rgba(26,23,20,.07), 0 4px 16px rgba(26,23,20,.04);
  --sh-lg: 0 8px 32px rgba(26,23,20,.13);
  --r: 10px; --rs: 6px;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
body { font-family: 'Pretendard', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; font-size: 14px; line-height: 1.6; }
main { padding: 20px 2.5% 100px; width: 95%; max-width: 1800px; margin: 0 auto; }

/* ── Login ── */
#login-screen { position: fixed; inset: 0; background: var(--paper); display: flex; align-items: center; justify-content: center; z-index: 1000; }
#login-screen.off { display: none; }
.login-box { background: var(--card); border-radius: 24px; padding: 56px 48px; max-width: 420px; width: 90%; box-shadow: var(--sh-lg); border: 1px solid var(--bd); text-align: center; }
.login-logo { font-family: 'Nanum Myeongjo', serif; font-size: 32px; font-weight: 800; color: var(--accent); margin-bottom: 8px; }
.login-sub { font-size: 14px; color: var(--ink-m); margin-bottom: 40px; line-height: 1.6; }
.pw-wrap { position: relative; margin-bottom: 16px; }
.pw-input { width: 100%; padding: 15px 16px; border: 2px solid var(--bd); border-radius: var(--rs); font-family: 'Pretendard', sans-serif; font-size: 16px; color: var(--ink); background: var(--paper); outline: none; transition: all .2s; text-align: center; letter-spacing: 0.1em; }
.pw-input:focus { border-color: var(--accent-m); background: #fff; }
.pw-toggle { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--ink-f); font-size: 18px; }
.login-btn { width: 100%; padding: 15px; background: var(--accent); color: #fff; border: none; border-radius: var(--rs); font-family: 'Pretendard', sans-serif; font-size: 16px; font-weight: 700; cursor: pointer; transition: background .2s; }
.login-btn:hover { background: #1e4a36; }
.login-error { font-size: 13px; color: var(--warn); margin-top: 12px; min-height: 20px; font-weight: 500; }
.login-remember { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 20px; cursor: pointer; }
.login-remember input { width: 16px; height: 16px; cursor: pointer; accent-color: var(--accent); }
.login-remember span { font-size: 13px; color: var(--ink-m); }

/* ── Date Filter Bar ── */
.date-bar { background: var(--card); border-bottom: 1px solid var(--bd); padding: 12px 2.5%; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.date-bar label { font-size: 12px; font-weight: 700; color: var(--ink-m); }
.date-inp { padding: 8px 14px; border: 1.5px solid var(--bd); border-radius: var(--rs); font-family: 'Pretendard', sans-serif; font-size: 13px; color: var(--ink); background: var(--paper); outline: none; transition: border-color .2s; cursor: pointer; }
.date-inp:focus { border-color: var(--accent-m); }
.date-btn { padding: 8px 16px; background: var(--accent); color: #fff; border: none; border-radius: var(--rs); font-family: 'Pretendard', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; transition: background .2s; }
.date-btn:hover { background: #1e4a36; }
.date-sep { color: var(--ink-f); font-size: 13px; }

/* ── Header ── */
header { background: var(--card); border-bottom: 1px solid var(--bd); height: 64px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 500; padding: 0 2.5%; }
.brand { font-family: 'Nanum Myeongjo', serif; font-size: 18px; font-weight: 800; color: var(--accent); display: flex; align-items: center; gap: 10px; }
.bdot { width: 8px; height: 8px; background: var(--accent-m); border-radius: 50%; box-shadow: 0 0 8px var(--accent-m); }
.hright { display: flex; align-items: center; gap: 12px; }
.qbadge { background: var(--warn-l); color: var(--warn); font-size: 11px; font-weight: 800; padding: 5px 12px; border-radius: 20px; border: 1px solid rgba(196,92,38,0.2); }
.hsm { padding: 8px 16px; background: var(--warm); border: 1px solid var(--bd); border-radius: var(--rs); font-family: 'Pretendard', sans-serif; font-size: 13px; font-weight: 600; color: var(--ink-m); cursor: pointer; transition: all .2s; }
.hsm:hover { background: var(--accent-l); color: var(--accent); border-color: var(--accent-m); }
.hsm.ghost { background: transparent; border: none; }

/* ── Filter Bar ── */
.fbar { background: var(--card); border-bottom: 1px solid var(--bd); display: flex; align-items: center; overflow-x: auto; padding: 0 2.5%; scrollbar-width: none; }
.fbar::-webkit-scrollbar { display: none; }
.ftab { padding: 16px 20px; font-size: 14px; font-weight: 600; color: var(--ink-m); cursor: pointer; border-bottom: 3px solid transparent; white-space: nowrap; background: none; border-left: none; border-right: none; border-top: none; font-family: 'Pretendard', sans-serif; transition: all .2s; }
.ftab.on { color: var(--accent); border-bottom-color: var(--accent); }
.tcnt { display: inline-flex; align-items: center; justify-content: center; min-width: 20px; height: 20px; padding: 0 6px; background: var(--warm); border-radius: 10px; font-size: 11px; font-weight: 700; margin-left: 6px; color: var(--ink-m); }
.ftab.on .tcnt { background: var(--accent-l); color: var(--accent); }

/* ── Table ── */
.thead { display: flex; align-items: baseline; gap: 12px; margin-bottom: 16px; }
.ttitle { font-family: 'Nanum Myeongjo', serif; font-size: 22px; font-weight: 800; color: var(--ink); }
.tmeta { font-size: 13px; color: var(--ink-m); }
.crm-tbl { width: 100%; border-collapse: separate; border-spacing: 0; background: var(--card); border: 1px solid var(--bd); border-radius: var(--r); overflow: hidden; box-shadow: var(--sh); table-layout: fixed; }
.crm-tbl thead tr { background: var(--warm); }
.crm-tbl th { padding: 14px; font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-m); text-align: left; border-bottom: 1px solid var(--bd); }
.crm-tbl tbody tr { border-bottom: 1px solid var(--bd); transition: background .15s; }
.crm-tbl tbody tr:hover { background: #fdfcfa; }
.crm-tbl td { padding: 18px 14px; vertical-align: top; border-bottom: 1px dotted var(--bd); }
.crm-tbl tr:last-child td { border-bottom: none; }

/* ── Memo Box ── */
.memo-box { background: var(--warm); border-left: 3px solid var(--bd); border-radius: 0 var(--rs) var(--rs) 0; padding: 12px 14px; font-size: 13px; color: var(--ink-m); line-height: 1.7; white-space: pre-wrap; word-break: break-all; max-height: 5.2em; overflow: hidden; transition: max-height 0.4s; position: relative; }
.memo-box.open { max-height: 2000px; background: #fff; border-color: var(--accent-m); }
.memo-box:not(.open).has-more::after { content: ""; position: absolute; bottom: 0; left: 0; width: 100%; height: 30px; background: linear-gradient(transparent, var(--warm)); pointer-events: none; }
.more-btn { display: block; width: 100%; padding: 6px; margin-top: 8px; background: var(--bd); border: none; border-radius: 4px; color: var(--ink-m); font-size: 11px; font-weight: 600; cursor: pointer; text-align: center; transition: all .2s; }
.more-btn:hover { background: var(--ink-f); color: #fff; }

/* ── Draft ── */
.draft-wrap { position: relative; }
.draft-text { font-size: 14px; line-height: 1.8; color: var(--ink); background: var(--card); border: 1.5px solid var(--bd); border-radius: var(--rs); padding: 14px 40px 14px 14px; white-space: pre-wrap; word-break: break-all; min-height: 80px; transition: border-color .2s; }
.draft-wrap:hover .draft-text { border-color: var(--accent-m); }
.draft-empty { color: var(--ink-f); font-style: italic; font-size: 13px; }
.edit-btn { position: absolute; top: 10px; right: 10px; width: 28px; height: 28px; border: 1px solid var(--bd); border-radius: var(--rs); background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--ink-m); opacity: 0; transition: all .2s; box-shadow: var(--sh); }
.draft-wrap:hover .edit-btn { opacity: 1; }
.edit-btn:hover { color: var(--accent); border-color: var(--accent); }
.ep { margin-top: 12px; padding: 16px; border: 1px solid var(--accent-m); background: #f9fdfb; border-radius: var(--rs); display: none; }
.ep.on { display: block; }
.erow { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.elabel { font-size: 11px; font-weight: 800; letter-spacing: 0.05em; text-transform: uppercase; color: var(--ink-m); margin-bottom: 8px; display: block; }
.etxt { width: 100%; padding: 12px; background: #fff; border: 1.5px solid var(--bd); border-radius: var(--rs); font-family: 'Pretendard', sans-serif; font-size: 13px; color: var(--ink); resize: vertical; min-height: 120px; outline: none; line-height: 1.6; transition: border-color .2s; }
.etxt:focus { border-color: var(--accent); }
.esave-wrap { margin-top: 14px; display: flex; justify-content: flex-end; align-items: center; gap: 12px; }
.esave { padding: 8px 20px; background: var(--accent); color: #fff; border: none; border-radius: var(--rs); font-family: 'Pretendard', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; transition: background .2s; }
.esave:hover { background: #1e4a36; }

/* ── AI Generate Button ── */
.btn-gen { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; background: var(--accent-l); color: var(--accent); border: 1px solid var(--accent-m); border-radius: var(--rs); font-family: 'Pretendard', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; transition: all .2s; margin-bottom: 8px; }
.btn-gen:hover { background: var(--accent); color: #fff; }
.btn-gen:disabled { opacity: 0.5; cursor: not-allowed; }

/* ── Badges ── */
.badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; white-space: nowrap; }
.bg { background: var(--accent-l); color: var(--accent); }
.bo { background: var(--warn-l); color: var(--warn); }
.bb { background: var(--info-l); color: var(--info); }
.bp { background: var(--purple-l); color: var(--purple); }
.bgr { background: var(--warm); color: var(--ink-m); }

/* ── Memo Input Panel ── */
.memo-panel { margin-top: 32px; background: var(--card); border: 1px solid var(--bd); border-radius: var(--r); box-shadow: var(--sh); overflow: hidden; }
.memo-panel-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; background: var(--warm); border-bottom: 1px solid var(--bd); cursor: pointer; }
.memo-panel-title { font-family: 'Nanum Myeongjo', serif; font-size: 16px; font-weight: 800; color: var(--accent); display: flex; align-items: center; gap: 8px; }
.memo-panel-body { padding: 20px; display: none; }
.memo-panel-body.open { display: block; }
.mp-row { display: flex; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
.mp-field { display: flex; flex-direction: column; gap: 5px; }
.mp-field label { font-size: 11px; font-weight: 700; color: var(--ink-m); letter-spacing: 0.05em; text-transform: uppercase; }
.mp-inp { padding: 10px 14px; border: 1.5px solid var(--bd); border-radius: var(--rs); font-family: 'Pretendard', sans-serif; font-size: 14px; color: var(--ink); background: var(--paper); outline: none; transition: border-color .2s; }
.mp-inp:focus { border-color: var(--accent-m); background: #fff; }
.mp-textarea { width: 100%; padding: 12px 14px; border: 1.5px solid var(--bd); border-radius: var(--rs); font-family: 'Pretendard', sans-serif; font-size: 14px; color: var(--ink); background: var(--paper); outline: none; resize: vertical; min-height: 90px; line-height: 1.7; transition: border-color .2s; }
.mp-textarea:focus { border-color: var(--accent-m); background: #fff; }
.upload-zone { border: 2px dashed var(--bd); border-radius: var(--rs); padding: 18px; text-align: center; color: var(--ink-m); cursor: pointer; transition: all .2s; font-size: 13px; background: var(--paper); }
.upload-zone:hover { border-color: var(--accent-m); background: var(--accent-l); color: var(--accent); }
.upload-zone input[type=file] { display: none; }
.mp-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 4px; }

/* ── Bottom Bar ── */
.add-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); border-top: 1px solid var(--bd); padding: 10px 2.5%; display: flex; align-items: center; gap: 14px; box-shadow: 0 -4px 20px rgba(26,23,20,.08); z-index: 600; height: 64px; }
.chart-inp { padding: 10px 16px; border: 2px solid var(--bd); border-radius: var(--rs); font-family: 'Pretendard', sans-serif; font-size: 14px; font-weight: 600; width: 200px; outline: none; transition: border-color .2s; }
.chart-inp:focus { border-color: var(--accent); }
.btn-plus { width: 42px; height: 42px; background: var(--accent); color: #fff; border: none; border-radius: var(--rs); font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .2s; }
.btn-plus:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(45,106,79,0.3); }

/* ── Status Select ── */
.stat-sel { width: 100%; padding: 8px 10px; border: 1.5px solid var(--bd); border-radius: var(--rs); font-family: 'Pretendard', sans-serif; font-size: 12px; font-weight: 600; color: var(--ink); background: var(--paper); outline: none; cursor: pointer; margin-bottom: 8px; }

/* ── Toast ── */
#toast { position: fixed; bottom: 84px; left: 50%; transform: translateX(-50%); padding: 12px 24px; border-radius: 40px; color: #fff; font-size: 14px; font-weight: 600; box-shadow: var(--sh-lg); z-index: 2000; opacity: 0; visibility: hidden; transition: all 0.3s; white-space: nowrap; }
#toast.on { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(-10px); }
#toast.ok { background: var(--accent); }
#toast.err { background: var(--warn); }
#toast.info { background: var(--info); }

/* ── Spinner ── */
#load-st { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 100px 0; }
.spin { width: 40px; height: 40px; border: 4px solid var(--bd); border-top-color: var(--accent); border-radius: 50%; animation: rot 0.8s linear infinite; margin-bottom: 16px; }
@keyframes rot { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">🌿 아이누리</div>
    <p class="login-sub">아이누리 CRM 워크스페이스<br>비밀번호를 입력해 주세요.</p>
    <div class="pw-wrap">
      <input type="password" id="pw-input" class="pw-input" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')doLogin()">
      <button class="pw-toggle" onclick="togglePw()" id="pw-eye">👁</button>
    </div>
    <button class="login-btn" onclick="doLogin()">입장</button>
    <p class="login-error" id="login-err"></p>
    <label class="login-remember"><input type="checkbox" id="remember-chk" checked><span>로그인 상태 유지</span></label>
  </div>
</div>

<!-- ── HEADER ── -->
<header>
  <div class="brand"><div class="bdot"></div>아이누리 CRM <span style="font-weight:400;font-size:14px;margin-left:8px;color:var(--ink-f)">v4.0</span></div>
  <div class="hright">
    <span class="qbadge" id="qcnt">데이터 확인 중...</span>
    <button class="hsm" onclick="load()">↺ 새로고침</button>
    <button class="hsm ghost" onclick="logout()">로그아웃</button>
  </div>
</header>

<!-- ── DATE FILTER BAR ── -->
<div class="date-bar">
  <label>CRM 예정일 기간</label>
  <input type="date" id="date-from" class="date-inp">
  <span class="date-sep">~</span>
  <input type="date" id="date-to" class="date-inp">
  <button class="date-btn" onclick="load()">🔍 조회</button>
  <button class="hsm" onclick="setToday()">오늘</button>
  <button class="hsm" onclick="setThisWeek()">이번 주</button>
  <button class="hsm" onclick="clearDateFilter()">전체 보기</button>
</div>

<!-- ── FILTER BAR ── -->
<div class="fbar">
  <button class="ftab on" onclick="setF('전체',this)">전체 <span class="tcnt" id="c-전체">0</span></button>
  <button class="ftab" onclick="setF('대기',this)">⏳ 대기 <span class="tcnt" id="c-대기">0</span></button>
  <button class="ftab" onclick="setF('검토완료',this)">✅ 검토완료 <span class="tcnt" id="c-검토완료">0</span></button>
  <button class="ftab" onclick="setF('보류',this)">🔸 보류 <span class="tcnt" id="c-보류">0</span></button>
  <button class="ftab" onclick="setF('발송완료',this)">📨 발송완료 <span class="tcnt" id="c-발송완료">0</span></button>
</div>

<!-- ── MAIN ── -->
<main>
  <div id="load-st">
    <div class="spin"></div>
    <p style="color:var(--ink-m);font-weight:600;">노션 데이터베이스 연결 중...</p>
  </div>

  <div id="tbl-wrap" style="display:none">
    <div class="thead">
      <span class="ttitle" id="ttitle">전체 리스트</span>
      <span class="tmeta" id="tmeta"></span>
    </div>
    <table class="crm-tbl">
      <thead>
        <tr>
          <th style="width:50px;text-align:center">No.</th>
          <th style="width:130px">환자 정보</th>
          <th style="width:120px">일정</th>
          <th style="width:260px">메모</th>
          <th>CRM 초안</th>
          <th style="width:150px;text-align:center">상태 관리</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>

    <!-- ── AI 메모 입력 패널 ── -->
    <div class="memo-panel">
      <div class="memo-panel-header" onclick="toggleMemoPanel()">
        <div class="memo-panel-title">
          ✨ AI 환자 등록
          <span style="font-size:12px;font-weight:400;font-family:'Pretendard';color:var(--ink-m)">| 텍스트 입력 → Gemini AI 분석 → Notion 자동 저장</span>
        </div>
        <span id="memo-panel-toggle" style="color:var(--ink-m);font-size:13px;">▼ 펼치기</span>
      </div>
      <div class="memo-panel-body" id="memo-panel-body">
        <!-- 텍스트 입력 -->
        <div style="margin-bottom:14px">
          <label style="font-size:11px;font-weight:700;color:var(--ink-m);letter-spacing:0.05em;text-transform:uppercase;display:block;margin-bottom:6px">내용 입력 (SNS 대화, 메모, 진료 기록 등 자유형식)</label>
          <textarea id="mp-text" class="mp-textarea" rows="6" placeholder="예: 관우 차트 10000005, 오늘 4/18 한약 2주치 수령. 소화는 많이 좋아졌다고 함. 수면은 아직 불규칙.&#10;&#10;또는 SNS 대화 내용을 그대로 붙여넣어도 됩니다."></textarea>
        </div>

        <!-- 파일 첨부 -->
        <div style="margin-bottom:16px">
          <label style="font-size:11px;font-weight:700;color:var(--ink-m);letter-spacing:0.05em;text-transform:uppercase;display:block;margin-bottom:6px">파일 첨부 (텍스트 파일)</label>
          <div class="upload-zone" onclick="document.getElementById('mp-file').click()" id="upload-label">
            <input type="file" id="mp-file" accept=".txt" onchange="onFileSelect(this)">
            📄 클릭하여 텍스트 파일 선택 (.txt)
          </div>
        </div>

        <div class="mp-actions">
          <button class="hsm" onclick="clearMemoPanel()">초기화</button>
          <button class="esave" id="mp-send-btn" onclick="sendAI()">✨ AI 분석 후 Notion 저장</button>
        </div>
      </div>
    </div>
  </div>
</main>

<!-- ── BOTTOM BAR ── -->
<div class="add-bar">
  <span style="font-size:13px;font-weight:800;color:var(--accent)">직접 등록</span>
  <input type="text" id="chart-q" class="chart-inp" placeholder="차트번호 입력 후 Enter" onkeydown="if(event.key==='Enter')addFromChart()">
  <button class="btn-plus" onclick="addFromChart()">+</button>
  <div style="margin-left:auto;color:var(--ink-f);font-size:12px">© 아이누리한의원 CRM</div>
</div>

<div id="toast"></div>

<script>
/* ════════════════════════════════════════
   설정값
   ════════════════════════════════════════ */
const DB_ID      = '04f406a5-be9b-454b-9dda-793fac2d4fb4';
const N8N_URL    = 'https://1jump2sky.duckdns.org/webhook/ai-crm-update';
const N8N_AI_URL = 'https://1jump2sky.duckdns.org/webhook/ai-crm-ai';

/* ── 상태 ── */
let patients  = [];
let curFilter = '전체';
let sessionPw = '';

/* ── 초기화 ── */
window.onload = () => {
  const saved = localStorage.getItem('crm_pw');
  if (saved) { sessionPw = saved; document.getElementById('login-screen').classList.add('off'); load(); }
  setToday();
};

/* ── Notion 프록시 호출 ── */
async function notion(path, method, body) {
  const res = await fetch('/api/notion?path=' + encodeURIComponent(path), {
    method: method || 'GET',
    headers: { 'Content-Type': 'application/json', 'x-crm-password': sessionPw },
    body: ['GET','HEAD'].includes(method) ? undefined : JSON.stringify(body)
  });
  if (res.status === 401) { logout(); throw new Error('인증 실패'); }
  if (!res.ok) throw new Error('API 오류');
  return res.json();
}

/* ── n8n 호출 ── */
async function callN8N(url, payload) {
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });
  if (!res.ok) throw new Error('n8n 응답 오류');
  return res.json().catch(() => ({}));
}

/* ── 날짜 필터 ── */
function setToday() {
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('date-from').value = today;
  document.getElementById('date-to').value   = today;
}
function setThisWeek() {
  const now  = new Date();
  const mon  = new Date(now); mon.setDate(now.getDate() - now.getDay() + 1);
  const sun  = new Date(mon); sun.setDate(mon.getDate() + 6);
  document.getElementById('date-from').value = mon.toISOString().split('T')[0];
  document.getElementById('date-to').value   = sun.toISOString().split('T')[0];
}
function clearDateFilter() {
  document.getElementById('date-from').value = '';
  document.getElementById('date-to').value   = '';
  load();
}

/* ── 데이터 로드 ── */
async function load() {
  show('load-st'); hide('tbl-wrap');
  const from = document.getElementById('date-from').value;
  const to   = document.getElementById('date-to').value;

  try {
    const queryBody = {
      sorts: [{ property: 'CRM예정일', direction: 'ascending' }]
    };

    // 날짜 필터 적용
    if (from || to) {
      const filters = [];
      if (from) filters.push({ property: 'CRM예정일', date: { on_or_after: from } });
      if (to)   filters.push({ property: 'CRM예정일', date: { on_or_before: to } });
      queryBody.filter = filters.length === 1 ? filters[0] : { and: filters };
    }

    const res = await notion(`/databases/${DB_ID}/query`, 'POST', queryBody);
    patients = res.results.map(parse);
    renderTable();
    updateCounts();
  } catch(e) {
    hide('load-st');
    toast('데이터를 불러오지 못했습니다.', 'err');
  }
}

/* ── Notion 페이지 파서 ── */
function parse(page) {
  const p = page.properties;
  const g = (k, t) => {
    if (!p[k]) return '';
    if (t === 'title')  return p[k].title?.[0]?.plain_text || '';
    if (t === 'rt')     return p[k].rich_text?.map(x => x.plain_text).join('') || '';
    if (t === 'sel')    return p[k].select?.name || '';
    if (t === 'date')   return p[k].date?.start || '';
    return '';
  };
  return {
    id:         page.id,
    관리번호:   g('관리번호', 'title'),
    차트번호:   g('차트번호', 'rt'),
    환자명:     g('환자명', 'rt'),
    등록일:     g('등록일', 'date'),
    CRM예정일:  g('CRM예정일', 'date'),
    메모:       g('메모', 'rt'),
    CRM초안:    g('CRM초안', 'rt'),
    발송상태:   g('발송상태', 'sel')
  };
}

/* ── 테이블 렌더링 ── */
function renderTable() {
  hide('load-st'); show('tbl-wrap');
  const list = curFilter === '전체' ? patients : patients.filter(p => p.발송상태 === curFilter);
  document.getElementById('tmeta').innerText = `총 ${list.length}건`;
  document.getElementById('tbody').innerHTML = list.map((p, i) => {
    const hasMore  = (p.메모||'').length > 100;
    const hasDraft = p.CRM초안 && p.CRM초안.trim();
    const statColor = { '대기':'bgr', '검토완료':'bg', '보류':'bo', '발송완료':'bb' }[p.발송상태] || 'bgr';
    return `
    <tr id="row-${p.id}">
      <td style="text-align:center;color:var(--ink-f);font-weight:700">${i+1}</td>
      <td>
        <div style="font-weight:800;font-size:15px;margin-bottom:4px">${esc(p.환자명||'(이름없음)')}</div>
        <div style="font-size:12px;color:var(--ink-m);margin-bottom:4px">차트 ${esc(p.차트번호)}</div>
        <div style="font-size:11px;color:var(--ink-f)">관리번호 ${esc(p.관리번호)}</div>
      </td>
      <td>
        <div style="font-size:12px;color:var(--ink-m);margin-bottom:4px">
          <span style="font-weight:700;color:var(--accent)">CRM예정일</span><br>
          ${p.CRM예정일 ? `<span style="font-size:14px;font-weight:700;color:var(--ink)">${p.CRM예정일}</span>` : '<span style="color:var(--ink-f)">미정</span>'}
        </div>
        <div style="font-size:11px;color:var(--ink-f)">등록 ${esc(p.등록일)}</div>
      </td>
      <td>
        <div id="m-box-${p.id}" class="memo-box ${hasMore?'has-more':''}">${esc(p.메모||'메모 없음')}</div>
        ${hasMore ? `<button class="more-btn" onclick="toggleMemo('${p.id}')">▼ 더 보기</button>` : ''}
      </td>
      <td>
        <div class="draft-wrap">
          <button class="btn-gen" id="gen-btn-${p.id}" onclick="generateDraft('${p.id}')">
            ✨ CRM 초안 ${hasDraft ? '재생성' : '생성'}
          </button>
          <div class="draft-text ${hasDraft?'':'draft-empty'}" id="view-dt-${p.id}">
            ${hasDraft ? esc(p.CRM초안) : '버튼을 눌러 AI 초안을 생성하세요.'}
          </div>
          ${hasDraft ? `<button class="edit-btn" onclick="toggleEp('${p.id}')" title="수정">✎</button>` : ''}
          <div class="ep" id="ep-${p.id}">
            <div class="erow">
              <div>
                <label class="elabel">발송용 문구 수정</label>
                <textarea class="etxt" id="dt-${p.id}">${esc(p.CRM초안)}</textarea>
              </div>
              <div>
                <label class="elabel" style="color:var(--warn)">수정 사유</label>
                <textarea class="etxt" id="rs-${p.id}" placeholder="수정 이유를 간단히 입력하세요"></textarea>
              </div>
            </div>
            <div class="esave-wrap">
              <button class="esave" onclick="saveDraft('${p.id}')">💾 저장</button>
            </div>
          </div>
        </div>
      </td>
      <td style="text-align:center">
        <select class="stat-sel" onchange="updateStat('${p.id}', this.value)">
          <option ${p.발송상태==='대기'?'selected':''}>대기</option>
          <option ${p.발송상태==='검토완료'?'selected':''}>검토완료</option>
          <option ${p.발송상태==='보류'?'selected':''}>보류</option>
          <option ${p.발송상태==='발송완료'?'selected':''}>발송완료</option>
        </select>
        <button class="hsm" style="width:100%;font-size:11px" onclick="copyDraft('${p.id}')">📋 초안 복사</button>
      </td>
    </tr>`;
  }).join('') || `<tr><td colspan="6" style="text-align:center;padding:60px;color:var(--ink-f)">해당 기간에 CRM 예정 환자가 없습니다.</td></tr>`;
}

/* ── AI CRM 초안 생성 ── */
async function generateDraft(id) {
  const p   = patients.find(x => x.id === id);
  const btn = document.getElementById('gen-btn-' + id);
  btn.disabled = true; btn.textContent = '⏳ 생성 중...';
  toast(`${p.환자명||'환자'}님 초안 생성 중...`, 'info');

  try {
    // Gemini AI로 CRM 초안 생성 요청
    const text = `환자명: ${p.환자명}\n차트번호: ${p.차트번호}\n메모: ${p.메모}\nCRM예정일: ${p.CRM예정일}\n\n위 내용을 바탕으로 한의원 CRM 문자 초안을 작성해주세요. 친근하고 따뜻한 톤으로, 200자 이내로 작성해주세요.`;

    const geminiRes = await fetch('/api/notion?path=/gemini', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-crm-password': sessionPw },
      body: JSON.stringify({ contents: [{ role: 'user', parts: [{ text }] }] })
    });
    const geminiData = await geminiRes.json();
    const draft = geminiData?.candidates?.[0]?.content?.parts?.[0]?.text || '';

    if (!draft) throw new Error('초안 생성 실패');

    // Notion에 저장
    await notion(`/pages/${id}`, 'PATCH', {
      properties: { 'CRM초안': { rich_text: [{ text: { content: draft } }] } }
    });

    p.CRM초안 = draft;
    toast('초안이 생성되었습니다!', 'ok');
    renderTable();
  } catch(e) {
    toast('초안 생성 실패: ' + e.message, 'err');
    btn.disabled = false; btn.textContent = '✨ CRM 초안 생성';
  }
}

/* ── AI 텍스트 분석 후 Notion 등록 ── */
async function sendAI() {
  const text = document.getElementById('mp-text').value.trim();
  const file  = document.getElementById('mp-file').files[0];

  let content = text;

  if (!content && file) {
    content = await file.text();
  }
  if (!content) { toast('내용을 입력하거나 파일을 첨부하세요.', 'err'); return; }

  const btn = document.getElementById('mp-send-btn');
  btn.disabled = true; btn.textContent = '⏳ AI 분석 중...';

  try {
    await callN8N(N8N_AI_URL, { text: content });
    toast('AI가 분석하여 Notion에 저장했습니다!', 'ok');
    clearMemoPanel();
    setTimeout(() => load(), 2000);
  } catch(e) {
    toast('전송 실패: ' + e.message, 'err');
  } finally {
    btn.disabled = false; btn.textContent = '✨ AI 분석 후 Notion 저장';
  }
}

/* ── 차트번호로 직접 조회/등록 ── */
async function addFromChart() {
  const chart = document.getElementById('chart-q').value.trim();
  if (!chart) return;

  toast(`차트번호 ${chart} 조회 중...`, 'info');
  try {
    const res = await callN8N(N8N_URL, {
      action: 'READ',
      차트번호: chart
    });
    if (res.rows && res.rows.length > 0) {
      toast(`${res.rows.length}건 조회되었습니다.`, 'ok');
      load();
    } else {
      toast('해당 차트번호가 없습니다. AI 등록 패널을 이용해주세요.', 'info');
    }
  } catch(e) {
    toast('조회 실패', 'err');
  }
  document.getElementById('chart-q').value = '';
}

/* ── 초안 수정 저장 ── */
async function saveDraft(id) {
  const newDraft = document.getElementById('dt-' + id).value;
  const reason   = document.getElementById('rs-' + id).value.trim();
  if (!reason) { toast('수정 사유를 입력하세요.', 'err'); return; }

  const p = patients.find(x => x.id === id);
  const today = new Date().toLocaleDateString('ko-KR');
  const newMemo = `[${today} 수정] ${reason}\n${p.메모}`;

  try {
    await notion(`/pages/${id}`, 'PATCH', {
      properties: {
        'CRM초안': { rich_text: [{ text: { content: newDraft } }] },
        '메모':    { rich_text: [{ text: { content: newMemo  } }] }
      }
    });
    p.CRM초안 = newDraft; p.메모 = newMemo;
    toast('저장되었습니다.', 'ok');
    renderTable();
  } catch(e) { toast('저장 실패', 'err'); }
}

/* ── 발송 상태 변경 ── */
async function updateStat(id, val) {
  try {
    await notion(`/pages/${id}`, 'PATCH', {
      properties: { '발송상태': { select: { name: val } } }
    });
    const p = patients.find(x => x.id === id);
    if (p) p.발송상태 = val;
    updateCounts();
    toast(`상태 변경: ${val}`, 'ok');
  } catch(e) { toast('상태 변경 실패', 'err'); }
}

/* ── 카운트 업데이트 ── */
function updateCounts() {
  const counts = { '전체': patients.length, '대기': 0, '검토완료': 0, '보류': 0, '발송완료': 0 };
  patients.forEach(p => { if (counts[p.발송상태] !== undefined) counts[p.발송상태]++; });
  Object.keys(counts).forEach(k => { const el = document.getElementById('c-'+k); if(el) el.innerText = counts[k]; });
  const undone = patients.filter(x => x.발송상태 !== '발송완료').length;
  document.getElementById('qcnt').innerText = `미발송: ${undone}건`;
}

/* ── 로그인 ── */
async function doLogin() {
  const pw = document.getElementById('pw-input').value;
  if (!pw) return;

  // 서버에 비밀번호 검증
  try {
    const res = await fetch('/api/notion?path=/users/me', {
      method: 'GET',
      headers: { 'x-crm-password': pw }
    });
    if (res.status === 401) {
      document.getElementById('login-err').innerText = '비밀번호가 올바르지 않습니다.';
      return;
    }
    sessionPw = pw;
    if (document.getElementById('remember-chk').checked) localStorage.setItem('crm_pw', pw);
    document.getElementById('login-screen').classList.add('off');
    load();
  } catch(e) {
    document.getElementById('login-err').innerText = '서버 연결 실패';
  }
}

function logout() { localStorage.removeItem('crm_pw'); location.reload(); }
function togglePw() {
  const input = document.getElementById('pw-input');
  input.type = input.type === 'password' ? 'text' : 'password';
  document.getElementById('pw-eye').innerText = input.type === 'password' ? '👁' : '🔒';
}

/* ── UI 헬퍼 ── */
function toggleMemo(id) {
  const box = document.getElementById('m-box-'+id);
  box.classList.toggle('open');
  box.nextElementSibling.innerText = box.classList.contains('open') ? '▲ 닫기' : '▼ 더 보기';
}
function toggleEp(id) { document.getElementById('ep-'+id).classList.toggle('on'); }
function toggleMemoPanel() {
  const body   = document.getElementById('memo-panel-body');
  const toggle = document.getElementById('memo-panel-toggle');
  body.classList.toggle('open');
  toggle.textContent = body.classList.contains('open') ? '▲ 닫기' : '▼ 펼치기';
}
function onFileSelect(input) {
  document.getElementById('upload-label').childNodes[1].textContent = input.files[0] ? `📎 ${input.files[0].name}` : '📄 클릭하여 텍스트 파일 선택 (.txt)';
}
function clearMemoPanel() {
  document.getElementById('mp-text').value = '';
  document.getElementById('mp-file').value = '';
}
function setF(f, el) {
  curFilter = f;
  document.querySelectorAll('.ftab').forEach(t => t.classList.remove('on'));
  el.classList.add('on');
  renderTable();
}
function copyDraft(id) {
  const txt = document.getElementById('view-dt-'+id).innerText;
  navigator.clipboard.writeText(txt).then(() => toast('복사되었습니다.', 'ok'));
}
function toast(msg, type) {
  const t = document.getElementById('toast');
  t.innerText = msg; t.className = 'on ' + type;
  clearTimeout(t._t); t._t = setTimeout(() => t.className = '', 3500);
}
function esc(str) {
  return !str ? '' : String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[m]));
}
function show(id) { document.getElementById(id).style.display = 'flex'; }
function hide(id) { document.getElementById(id).style.display = 'none'; }
</script>
